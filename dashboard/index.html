function RemoteConfigPanel({ remote, open, onClose, onSave, onDelete, token }) {
  const [config, setConfig] = useState(null);
  const [saving, setSaving] = useState(false);
  const [error, setError] = useState('');
  const isNew = !remote;

  useEffect(() => {
    if (open) {
      if (remote) {
        setConfig({ ...remote, credential: remote.credential_set ? '***' : '' });
      } else {
        setConfig({
          name: '', url: '', auth_type: 'none', credential: '',
          description: '', enabled: true, timeout: 30,
          refresh_seconds: 300, tool_prefix: '',
        });
      }
      setError('');
    }
  }, [open, remote]);

  const handleFieldChange = (field, value) => {
    setConfig(prev => ({ ...prev, [field]: value }));
  };

  const handleSave = async () => {
    setSaving(true);
    setError('');
    try {
      const payload = { ...config };
      if (payload.credential === '***') delete payload.credential;
      payload.timeout = parseInt(payload.timeout) || 30;
      payload.refresh_seconds = parseInt(payload.refresh_seconds) || 300;
      payload.enabled = payload.enabled !== false;
      const name = isNew ? encodeURIComponent(payload.name) : encodeURIComponent(remote.name);
      await api('PUT', `/v1/dashboard/remotes/${name}`, payload, token);
      if (onSave) onSave();
      onClose();
    } catch (err) {
      setError(err.message);
    }
    setSaving(false);
  };

  const handleDelete = async () => {
    if (!remote) return;
    if (!confirm(`Remove remote MCP server "${remote.name}"? This will stop all federation with this server.`)) return;
    try {
      await api('DELETE', `/v1/dashboard/remotes/${encodeURIComponent(remote.name)}`, null, token);
      if (onDelete) onDelete();
      onClose();
    } catch (err) {
      setError(err.message);
    }
  };

  if (!open || !config) return null;

  return (
    <>
      <div className={`slideout-overlay ${open ? 'open' : ''}`} onClick={onClose} />
      <div className={`slideout-panel ${open ? 'open' : ''}`}>
        <div className="slideout-header">
          <h3>{isNew ? 'Add Remote MCP Server' : `Configure: ${remote.name}`}</h3>
          <button className="slideout-close" onClick={onClose}>&times;</button>
        </div>
        <div className="slideout-body">
          {error && <div className="modal-error" style={{ marginBottom: '16px' }}>{error}</div>}

          <div className="form-section-title">Remote Server</div>
          <div className="form-group">
            <label className="form-label">Name</label>
            <input className="form-input" value={config.name || ''} readOnly={!isNew}
              style={isNew ? {} : { opacity: 0.5 }}
              onChange={e => handleFieldChange('name', e.target.value)}
              placeholder="e.g. weather-api" />
          </div>
          <div className="form-group">
            <label className="form-label">MCP Endpoint URL</label>
            <input className="form-input" value={config.url || ''}
              onChange={e => handleFieldChange('url', e.target.value)}
              placeholder="e.g. https://api.example.com/mcp" />
          </div>
          <div className="form-group">
            <label className="form-label">Description</label>
            <input className="form-input" value={config.description || ''}
              onChange={e => handleFieldChange('description', e.target.value)}
              placeholder="Weather forecasting MCP server" />
          </div>
          <div className="form-group">
            <label className="form-label">Tool Prefix (optional, defaults to name)</label>
            <input className="form-input" value={config.tool_prefix || ''}
              onChange={e => handleFieldChange('tool_prefix', e.target.value)}
              placeholder="e.g. wx (tools appear as wx.get_forecast)" />
          </div>
          <div className="form-group" style={{ display: 'flex', alignItems: 'center', gap: '8px' }}>
            <input type="checkbox" checked={config.enabled !== false}
              onChange={e => handleFieldChange('enabled', e.target.checked)}
              style={{ accentColor: 'var(--green)' }} />
            <label className="form-label" style={{ marginBottom: 0 }}>Enabled</label>
          </div>

          <div className="form-section-title">Authentication</div>
          <div className="form-group">
            <label className="form-label">Auth Type</label>
            <select className="form-select" value={config.auth_type || 'none'}
              onChange={e => handleFieldChange('auth_type', e.target.value)}>
              <option value="none">None</option>
              <option value="bearer">Bearer Token</option>
              <option value="basic">Basic Auth</option>
              <option value="header">Custom Header</option>
            </select>
          </div>
          {config.auth_type !== 'none' && (
            <div className="form-group">
              <label className="form-label">Credential</label>
              <input className="form-input" type="password"
                value={config.credential === '***' ? '' : (config.credential || '')}
                onChange={e => handleFieldChange('credential', e.target.value)}
                placeholder={config.credential === '***' ? 'set - enter new to change' : 'API key or token'} />
            </div>
          )}

          <div className="form-section-title">Tuning</div>
          <div className="form-row">
            <div className="form-group">
              <label className="form-label">Timeout (seconds)</label>
              <input className="form-input" type="number" value={config.timeout || 30}
                onChange={e => handleFieldChange('timeout', e.target.value)} />
            </div>
            <div className="form-group">
              <label className="form-label">Refresh Interval (seconds)</label>
              <input className="form-input" type="number" value={config.refresh_seconds || 300}
                onChange={e => handleFieldChange('refresh_seconds', e.target.value)} />
            </div>
          </div>
        </div>
        <div className="slideout-footer">
          {!isNew && (
            <button className="btn btn-revoke" onClick={handleDelete} style={{ marginRight: 'auto' }}>REMOVE</button>
          )}
          <button className="btn btn-amber" onClick={onClose}>CANCEL</button>
          <button className="btn btn-green" onClick={handleSave} disabled={saving}>
            {saving ? 'SAVING...' : 'SAVE'}
          </button>
        </div>
      </div>
    </>
  );
}

function MCPServersView({ token }) {
  const [remotes, setRemotes] = useState([]);
  const [loading, setLoading] = useState(true);
  const [configRemote, setConfigRemote] = useState(null);
  const [showAdd, setShowAdd] = useState(false);

  const fetchRemotes = useCallback(async () => {
    try {
      const data = await api('GET', '/v1/dashboard/remotes', null, token);
      setRemotes((data || []).sort((a, b) => (a.name || '').localeCompare(b.name || '')));
    } catch {}
    setLoading(false);
  }, [token]);

  useEffect(() => { fetchRemotes(); }, [fetchRemotes]);
  // Auto-refresh every 10s to pick up status changes
  useEffect(() => {
    const iv = setInterval(fetchRemotes, 10000);
    return () => clearInterval(iv);
  }, [fetchRemotes]);

  const handleRefresh = () => { fetchRemotes(); };

  const handleToggleRemoteDirect = async (name) => {
    try {
      const result = await api('POST', `/v1/dashboard/remotes/${encodeURIComponent(name)}/toggle`, null, token);
      setRemotes(prev => prev.map(r => r.name === name ? { ...r, enabled: result.enabled, status: result.enabled ? r.status : 'disconnected' } : r));
    } catch {}
  };

  const handleForceRefresh = async (name) => {
    try {
      await api('POST', `/v1/dashboard/remotes/${encodeURIComponent(name)}/refresh`, null, token);
      // Refetch after a short delay to show updated status
      setTimeout(fetchRemotes, 1500);
    } catch {}
  };

  const fmtTime = (ts) => {
    if (!ts) return 'never';
    const d = new Date(ts);
    const now = new Date();
    const diffMs = now - d;
    if (diffMs < 60000) return `${Math.floor(diffMs / 1000)}s ago`;
    if (diffMs < 3600000) return `${Math.floor(diffMs / 60000)}m ago`;
    if (diffMs < 86400000) return `${Math.floor(diffMs / 3600000)}h ago`;
    return d.toLocaleDateString();
  };

  return (
    <>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '16px' }}>
        <span style={{ fontSize: '11px', color: 'var(--text-dim)' }}>
          {remotes.length} MCP server{remotes.length !== 1 ? 's' : ''} configured
          {remotes.filter(r => r.status === 'connected').length > 0 &&
            ` \u2022 ${remotes.filter(r => r.status === 'connected').length} connected`}
        </span>
        <button className="btn btn-green" onClick={() => setShowAdd(true)}>+ ADD MCP SERVER</button>
      </div>

      {loading ? (
        <div className="loading">Loading remotes...</div>
      ) : (
        <div className="services-grid">
          {remotes.length === 0 ? (
            <div className="empty-state" style={{ gridColumn: '1 / -1' }}>
              No MCP servers configured. Add one to federate tools from external servers.
            </div>
          ) : remotes.map(r => (
            <div key={r.name} className={`service-card${r.enabled === false ? ' item-disabled' : ''}`} style={{ borderColor: r.status === 'error' ? 'rgba(255,0,60,0.3)' : r.status === 'connected' ? 'rgba(168,85,247,0.3)' : undefined }}>
              <div className="service-card-header">
                <span className="service-card-name">{r.name}</span>
                <RemoteStatusBadge status={r.status} />
              </div>
              <div className="service-card-url">{r.url || '-'}</div>
              {r.description && <div className="service-card-desc">{r.description}</div>}
              <div className="remote-card-stats">
                <span>Tools: <span className="stat-count">{r.tool_count || 0}</span></span>
                <span>Resources: <span className="stat-count">{r.resource_count || 0}</span></span>
              </div>
              <div className="remote-card-refresh">Last refresh: {fmtTime(r.last_refresh)}</div>
              {r.last_error && <div className="remote-card-error">{r.last_error}</div>}
              <div className="service-card-actions">
                <button className="btn btn-cyan" onClick={() => setConfigRemote(r)}>CONFIGURE</button>
                <button className="btn btn-amber" onClick={() => handleForceRefresh(r.name)}>REFRESH</button>
                <div style={{ marginLeft: 'auto', display: 'flex', alignItems: 'center', gap: '6px' }}>
                  <span style={{ fontSize: '10px', color: 'var(--text-dim)' }}>{r.enabled !== false ? 'ON' : 'OFF'}</span>
                  <ToggleSwitch checked={r.enabled !== false} onChange={() => handleToggleRemoteDirect(r.name)} />
                </div>
              </div>
            </div>
          ))}
        </div>
      )}

      <RemoteConfigPanel
        remote={showAdd ? null : configRemote}
        open={showAdd || !!configRemote}
        onClose={() => { setConfigRemote(null); setShowAdd(false); }}
        onSave={handleRefresh}
        onDelete={handleRefresh}
        token={token}
      />
    </>
  );
}

      <span>{tab.label || `Terminal ${tab.id}`}</span>

function TerminalInstance({ tab, token, onStatusChange }) {
  const termContainerRef = useRef(null);
  const termRef = useRef(null);
  const fitAddonRef = useRef(null);
  const wsRef = useRef(null);

  useEffect(() => {
    if (!termContainerRef.current || termRef.current) return;

    const term = new window.Terminal({
      fontFamily: '"JetBrains Mono", monospace',
      fontSize: 13,
      theme: {
        background: '#0a0e17',
        foreground: '#c9d1d9',
        cursor: '#00ff9d',
        cursorAccent: '#0a0e17',
        selectionBackground: 'rgba(0,255,157,0.2)',
        black: '#0a0e17',
        red: '#ff003c',
        green: '#00ff9d',
        yellow: '#ffb700',
        blue: '#00d4ff',
        magenta: '#a855f7',
        cyan: '#00d4ff',
        white: '#c9d1d9',
      },
      cursorBlink: true,
      allowTransparency: true,
      scrollback: 5000,
    });

    const fitAddon = new window.FitAddon.FitAddon();
    term.loadAddon(fitAddon);
    term.open(termContainerRef.current);
    fitAddon.fit();
    termRef.current = term;
    fitAddonRef.current = fitAddon;

    term.writeln('\x1b[32m[CLAUTH Terminal]\x1b[0m Ready to connect.');
    term.writeln('');

    const resizeObserver = new ResizeObserver(() => {
      try { fitAddon.fit(); } catch {}
    });
    resizeObserver.observe(termContainerRef.current);

    return () => {
      resizeObserver.disconnect();
      if (wsRef.current) wsRef.current.close();
      term.dispose();
      termRef.current = null;
    };
  }, []);

  const connect = useCallback((connConfig) => {
    if (wsRef.current) { wsRef.current.close(); wsRef.current = null; }
    const term = termRef.current;
    if (!term) return;

    term.clear();
    term.writeln(`\x1b[33m[Connecting to ${connConfig.host}...]\x1b[0m`);
    onStatusChange(tab.id, 'connecting');

    const wsUrl = `${getWsUrl()}/v1/dashboard/terminal?token=${encodeURIComponent(token)}`;
    const ws = new WebSocket(wsUrl);
    wsRef.current = ws;

    ws.onopen = () => {
      const dims = fitAddonRef.current ? { cols: term.cols, rows: term.rows } : { cols: 120, rows: 30 };
      ws.send(JSON.stringify({
        host: connConfig.host, port: connConfig.port || 22,
        user: connConfig.user, auth_type: connConfig.auth_type || 'certificate',
        password: connConfig.password || '', cols: dims.cols, rows: dims.rows,
      }));
      onStatusChange(tab.id, 'connected');
      term.writeln(`\x1b[32m[Connected]\x1b[0m`);
    };

    ws.onmessage = (e) => {
      if (typeof e.data === 'string') {
        try {
          const msg = JSON.parse(e.data);
          if (msg.error) {
            term.writeln(`\x1b[31m[Error: ${msg.error}]\x1b[0m`);
            onStatusChange(tab.id, 'error');
            return;
          }
        } catch {}
      }
      term.write(typeof e.data === 'string' ? e.data : new Uint8Array(e.data));
    };

    ws.onclose = () => {
      term.writeln('\r\n\x1b[33m[Disconnected]\x1b[0m');
      onStatusChange(tab.id, 'disconnected');
      wsRef.current = null;
    };

    ws.onerror = () => {
      term.writeln('\r\n\x1b[31m[Connection error]\x1b[0m');
      onStatusChange(tab.id, 'error');
    };

    term.onData(data => { if (ws.readyState === WebSocket.OPEN) ws.send(data); });
    term.onResize(({ cols, rows }) => {
      if (ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify({ type: 'resize', cols, rows }));
    });
  }, [tab.id, token, onStatusChange]);

  const disconnect = useCallback(() => {
    if (wsRef.current) { wsRef.current.close(); wsRef.current = null; }
  }, []);

  // Expose connect/disconnect
  useEffect(() => {
    tab._connect = connect;
    tab._disconnect = disconnect;
    tab._fitAddon = fitAddonRef;
  });

  return <div ref={termContainerRef} className="terminal-xterm-container" style={{ height: '100%' }} />;
}

// 6b. TASKS VIEW
// ═══════════════════════════════════════════════════════════════════════════════

function TasksView({ token, now }) {
  const [tasks, setTasks] = useState([]);
  const [loading, setLoading] = useState(true);
  const [statusFilter, setStatusFilter] = useState('ALL');
  const [depthFilter, setDepthFilter] = useState('ALL');
  const [agentFilter, setAgentFilter] = useState('');
  const [viewMode, setViewMode] = useState('TABLE');
  const [inspectTask, setInspectTask] = useState(null);
  const [inspectDetail, setInspectDetail] = useState(null);
  const [revokeTarget, setRevokeTarget] = useState(null);

  const fetchTasks = useCallback(async () => {
    try {
      const url = agentFilter ? `/v1/dashboard/tasks?agent=${encodeURIComponent(agentFilter)}` : '/v1/dashboard/tasks';
      const data = await api('GET', url, null, token);
      setTasks(data.tasks || []);
    } catch(e) { console.error('fetch tasks:', e); }
    setLoading(false);
  }, [token, agentFilter]);

  useEffect(() => { fetchTasks(); const iv = setInterval(fetchTasks, 5000); return () => clearInterval(iv); }, [fetchTasks]);

  const filtered = tasks.filter(t => {
    if (statusFilter === 'ACTIVE' && t.status !== 'active') return false;
    if (statusFilter === 'REVOKED' && t.status !== 'revoked') return false;
    if (depthFilter === 'ROOT' && t.depth !== 0) return false;
    if (depthFilter === 'DELEGATED' && t.depth === 0) return false;
    return true;
  });

  const activeCount = tasks.filter(t => t.status === 'active').length;
  const revokedCount = tasks.filter(t => t.status === 'revoked').length;
  const rootCount = tasks.filter(t => t.depth === 0).length;
  const delegatedCount = tasks.filter(t => t.depth > 0).length;

  const agents = [...new Set(tasks.map(t => t.agent_name))].sort();

  const handleRevoke = async (task) => {
    try {
      const preview = await api('POST', `/v1/dashboard/tasks/${task.id}/revoke?preview=true`, null, token);
      setRevokeTarget({ task, preview });
    } catch(e) { console.error('revoke preview:', e); }
  };

  const confirmRevoke = async () => {
    if (!revokeTarget) return;
    try {
      await api('POST', `/v1/dashboard/tasks/${revokeTarget.task.id}/revoke`, null, token);
      setRevokeTarget(null);
      fetchTasks();
    } catch(e) { console.error('revoke:', e); }
  };

  const handleInspect = async (task) => {
    setInspectTask(task);
    try {
      const detail = await api('GET', `/v1/dashboard/tasks/${task.id}`, null, token);
      setInspectDetail(detail);
    } catch(e) { console.error('inspect:', e); }
  };

  const tasksByRoot = useMemo(() => {
    const groups = {};
    filtered.forEach(t => {
      const rootId = t.root_id || t.id;
      if (!groups[rootId]) groups[rootId] = [];
      groups[rootId].push(t);
    });
    Object.values(groups).forEach(g => g.sort((a, b) => a.depth - b.depth));
    return groups;
  }, [filtered]);

  const renderTreeNode = (task, allTasks) => {
    const children = allTasks.filter(t => t.parent_id === task.id);
    return (
      <div key={task.id} className={task.depth === 0 ? 'task-tree-root' : 'task-tree-node'}>
        <div className="task-node-header">
          <span className={`task-status-dot ${task.status}`} />
          <span className={`badge ${task.depth === 0 ? 'badge-root' : 'badge-delegated'}`}>{task.depth === 0 ? 'ROOT' : `D${task.depth}`}</span>
          {task.can_delegate && <span className="badge badge-can-delegate">CAN DELEGATE</span>}
          <span className="task-node-desc">{task.description || task.id.slice(0, 12)}</span>
          <div className="task-node-actions">
            {task.status === 'active' && <button className="btn btn-revoke" style={{fontSize:'11px',padding:'2px 8px'}} onClick={(e) => { e.stopPropagation(); handleRevoke(task); }}>Revoke</button>}
            <button className="btn btn-purple" style={{fontSize:'11px',padding:'2px 8px'}} onClick={(e) => { e.stopPropagation(); handleInspect(task); }}>Inspect</button>
          </div>
        </div>
        <div className="task-node-meta">
          <span>{task.agent_name}</span>
          <span>TTL: {Math.max(0, Math.round(task.remaining_ttl_seconds))}s</span>
          {task.child_count > 0 && <span>{task.child_count} children</span>}
        </div>
        {children.length > 0 && (
          <div className="task-tree-level">
            {children.map(c => renderTreeNode(c, allTasks))}
          </div>
        )}
      </div>
    );
  };

  return (
    <div>
      {/* Revoke confirmation dialog */}
      {revokeTarget && (
        <div className="cascade-warning">
          <div className="cascade-warning-title">Revoke task: {revokeTarget.task.description || revokeTarget.task.id.slice(0,12)}</div>
          {revokeTarget.preview.cascade_count > 0 && (
            <div>This will also invalidate {revokeTarget.preview.cascade_count} child task{revokeTarget.preview.cascade_count > 1 ? 's' : ''}.</div>
          )}
          <div className="revoke-confirm" style={{marginTop:'8px'}}>
            <button className="btn btn-revoke" onClick={confirmRevoke}>Confirm Revoke</button>
            <button className="btn" onClick={() => setRevokeTarget(null)}>Cancel</button>
          </div>
        </div>
      )}

      {/* Filter bar */}
      <div style={{display:'flex', gap:'8px', alignItems:'center', flexWrap:'wrap', marginBottom:'16px'}}>
        <button className={`filter-btn ${statusFilter==='ALL'?'active':''}`} onClick={() => setStatusFilter('ALL')}>All ({tasks.length})</button>
        <button className={`filter-btn ${statusFilter==='ACTIVE'?'active':''}`} onClick={() => setStatusFilter('ACTIVE')}>Active ({activeCount})</button>
        <button className={`filter-btn ${statusFilter==='REVOKED'?'active':''}`} onClick={() => setStatusFilter('REVOKED')}>Revoked ({revokedCount})</button>
        <span style={{width:'1px',height:'20px',background:'var(--border)',margin:'0 4px'}} />
        <button className={`filter-btn ${depthFilter==='ALL'?'active':''}`} onClick={() => setDepthFilter('ALL')}>All Depths</button>
        <button className={`filter-btn ${depthFilter==='ROOT'?'active':''}`} onClick={() => setDepthFilter('ROOT')}>Root ({rootCount})</button>
        <button className={`filter-btn ${depthFilter==='DELEGATED'?'active':''}`} onClick={() => setDepthFilter('DELEGATED')}>Delegated ({delegatedCount})</button>
        <span style={{width:'1px',height:'20px',background:'var(--border)',margin:'0 4px'}} />
        <select value={agentFilter} onChange={e => setAgentFilter(e.target.value)} style={{background:'var(--bg-card)',color:'var(--text)',border:'1px solid var(--border)',borderRadius:'4px',padding:'4px 8px',fontSize:'13px'}}>
          <option value="">All Agents</option>
          {agents.map(a => <option key={a} value={a}>{a}</option>)}
        </select>
        <div style={{marginLeft:'auto',display:'flex',gap:'4px'}}>
          <button className={`filter-btn ${viewMode==='TABLE'?'active':''}`} onClick={() => setViewMode('TABLE')}>Table</button>
          <button className={`filter-btn ${viewMode==='TREE'?'active':''}`} onClick={() => setViewMode('TREE')}>Tree</button>
        </div>
      </div>

      {/* Content */}
      {loading ? (
        <div style={{color:'var(--text-dim)',padding:'20px'}}>Loading tasks...</div>
      ) : filtered.length === 0 ? (

                <td><span className={`badge ${t.depth === 0 ? 'badge-root' : 'badge-delegated'}`}>{t.depth === 0 ? 'ROOT' : `D${t.depth}`}</span></td>
                <td>{t.agent_name}</td>
                <td>

                </td>
                <td style={{minWidth:'120px'}}>

                    <TTLBar remaining={t.remaining_ttl_seconds} maxTTL={t.max_ttl_seconds} />
                  ) : (
                    <span style={{color:'var(--red)',fontSize:'12px'}}>revoked</span>
                  )}
                </td>
                <td>
                  {t.child_count > 0 ? <span className="badge badge-delegated">{t.child_count}</span> : '-'}
                  {t.can_delegate && <span className="badge badge-can-delegate" style={{marginLeft:'4px',fontSize:'10px'}}>{'\u2B2C'}</span>}
                </td>
                <td>
                  <div style={{display:'flex',gap:'4px'}}>
                    {t.status === 'active' && <button className="btn btn-revoke" style={{fontSize:'11px',padding:'2px 8px'}} onClick={() => handleRevoke(t)}>Revoke</button>}
                    <button className="btn btn-purple" style={{fontSize:'11px',padding:'2px 8px'}} onClick={() => handleInspect(t)}>Inspect</button>
                  </div>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      ) : (
        <div className="task-tree">
          {Object.entries(tasksByRoot).map(([rootId, treeTasks]) => (
            <div key={rootId} style={{marginBottom:'16px'}}>
              {treeTasks.filter(t => t.depth === 0).map(root => renderTreeNode(root, treeTasks))}
            </div>
          ))}
        </div>
      )}

      {/* Envelope inspector slideout */}
      {inspectTask && (
        <EnvelopeInspectorPanel
          task={inspectTask}
          detail={inspectDetail}
          onClose={() => { setInspectTask(null); setInspectDetail(null); }}
          token={token}
        />
      )}
    </div>
  );
}

function EnvelopeInspectorPanel({ task, detail, onClose, token }) {
  const [parentEnvelope, setParentEnvelope] = useState(null);

  useEffect(() => {
    if (task.depth > 0 && task.parent_id && token) {
      api('GET', `/v1/dashboard/tasks/${task.parent_id}`, null, token)
        .then(d => setParentEnvelope(d.envelope))
        .catch(() => {});
    }
    return () => setParentEnvelope(null);
  }, [task, token]);

  const env = task.envelope || {};

  const renderEnvelopeItems = (items, parentItems) => {
    if (!items || items.length === 0) return <span style={{color:'var(--text-dim)',fontSize:'12px'}}>none</span>;
    return (
      <div className="envelope-items">
        {items.map(item => <span key={item} className="envelope-item">{item}</span>)}
        {parentItems && parentItems.filter(p => !items.includes(p)).map(item => (
          <span key={'att-'+item} className="envelope-item attenuated">{item}</span>
        ))}
      </div>
    );
  };

  const sections = [
    { label: 'Targets', key: 'targets' },
    { label: 'Roles', key: 'roles' },
    { label: 'Services', key: 'services' },
    { label: 'Remotes', key: 'remotes' },
    { label: 'Methods', key: 'methods' },
  ];

  return (
    <>
      <div className="slideout-overlay open" onClick={onClose} />
      <div className="slideout-panel open" style={{padding:'20px',overflowY:'auto'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'20px'}}>
          <h3 style={{margin:0,fontFamily:'var(--heading-font)',fontSize:'14px',fontWeight:600,color:'var(--text-bright)',letterSpacing:'1px'}}>Task Envelope</h3>
          <button className="slideout-close" onClick={onClose}>&times;</button>
        </div>

        {/* Task info */}
        <div className="envelope-section">
          <div className="envelope-section-title">Task Info</div>
          <div style={{fontSize:'13px',display:'grid',gridTemplateColumns:'auto 1fr',gap:'4px 12px'}}>
            <span style={{color:'var(--text-dim)'}}>ID:</span>
            <span style={{fontFamily:'monospace',fontSize:'12px'}}>{task.id}</span>
            <span style={{color:'var(--text-dim)'}}>Agent:</span>
            <span>{task.agent_name}</span>
            <span style={{color:'var(--text-dim)'}}>Description:</span>
            <span>{task.description}</span>
            <span style={{color:'var(--text-dim)'}}>Depth:</span>
            <span><span className={`badge ${task.depth === 0 ? 'badge-root' : 'badge-delegated'}`}>{task.depth === 0 ? 'ROOT' : `Depth ${task.depth}`}</span></span>
            <span style={{color:'var(--text-dim)'}}>Status:</span>
            <span><span className={`task-status-dot ${task.status}`} style={{marginRight:'6px'}} />{task.status}</span>
            <span style={{color:'var(--text-dim)'}}>TTL:</span>
            <span>{Math.max(0, Math.round(task.remaining_ttl_seconds))}s remaining</span>
            <span style={{color:'var(--text-dim)'}}>Can Delegate:</span>
            <span>{task.can_delegate ? 'Yes' : 'No'}</span>
            <span style={{color:'var(--text-dim)'}}>Children:</span>
            <span>{String(task.child_count)}</span>
          </div>
        </div>

        {/* Lineage */}
        {detail && detail.lineage_details && detail.lineage_details.length > 1 && (
          <div className="envelope-section">
            <div className="envelope-section-title">Lineage</div>
            {detail.lineage_details.map((l, i) => (
              <div key={l.id} style={{paddingLeft: (i*16)+'px', fontSize:'13px', marginBottom:'2px'}}>
                {i > 0 && <span style={{color:'var(--text-dim)',marginRight:'4px'}}>{'\u2514\u2500'}</span>}
                <span className={`badge ${l.depth === 0 ? 'badge-root' : 'badge-delegated'}`} style={{fontSize:'10px',marginRight:'4px'}}>D{l.depth}</span>
                {l.description || l.id.slice(0,12)}
                <span style={{color:'var(--text-dim)',marginLeft:'6px',fontSize:'11px'}}>{l.status}</span>
              </div>
            ))}
          </div>
        )}

        {/* Envelope capabilities */}
        <div className="envelope-section" style={{marginTop:'16px'}}>
          <div className="envelope-section-title">{parentEnvelope ? 'Capability Envelope (attenuated items shown struck through)' : 'Capability Envelope'}</div>
          {sections.map(s => (
            <div key={s.key} style={{marginBottom:'12px'}}>
              <div style={{fontSize:'12px',color:'var(--text-dim)',marginBottom:'4px',fontWeight:600}}>{s.label}</div>
              {renderEnvelopeItems(env[s.key], parentEnvelope ? parentEnvelope[s.key] : null)}
            </div>
          ))}
        </div>

        {/* Children list */}
        {detail && detail.children && detail.children.length > 0 && (
          <div className="envelope-section">
            <div className="envelope-section-title">Children ({detail.children.length})</div>
            {detail.children.map(c => (
              <div key={c.id} style={{padding:'6px 8px',marginBottom:'4px',background:'rgba(255,255,255,0.03)',borderRadius:'4px',fontSize:'13px'}}>

                <span className="badge badge-delegated" style={{fontSize:'10px',marginRight:'6px'}}>D{c.depth}</span>
                {c.description || c.id.slice(0,12)}

              </div>
            ))}
          </div>
        )}
      </div>
    </>
  );
}

function TerminalView({ hosts, token }) {
  const [tabs, setTabs] = useState([]);
  const [activeTabId, setActiveTabId] = useState(null);
  const [tabStatuses, setTabStatuses] = useState({});
  const [showForm, setShowForm] = useState(null);
  const [formData, setFormData] = useState({ host: '', port: 22, user: '', auth_type: 'certificate', password: '' });
  const nextIdRef = useRef(1);

  const addTab = () => {
    if (tabs.length >= 5) return;
    const id = nextIdRef.current++;
    const tab = { id, label: `Term ${id}` };
    setTabs(prev => [...prev, tab]);
    setActiveTabId(id);
    setShowForm(id);
    setTabStatuses(prev => ({ ...prev, [id]: 'new' }));
  };

  const closeTab = (id) => {
    const tab = tabs.find(t => t.id === id);
    if (tab && tab._disconnect) tab._disconnect();
    setTabs(prev => prev.filter(t => t.id !== id));
    setTabStatuses(prev => { const n = { ...prev }; delete n[id]; return n; });
    if (activeTabId === id) {
      const remaining = tabs.filter(t => t.id !== id);
      setActiveTabId(remaining.length > 0 ? remaining[remaining.length - 1].id : null);
    }
  };

  const handleStatusChange = useCallback((tabId, status) => {
    setTabStatuses(prev => ({ ...prev, [tabId]: status }));
  }, []);

  const handleConnect = (tabId) => {
    const tab = tabs.find(t => t.id === tabId);
    if (tab && tab._connect) {
      tab._connect(formData);
      setShowForm(null);
      setTabs(prev => prev.map(t => t.id === tabId ? { ...t, label: formData.host.split('.')[0] || `Term ${tabId}` } : t));
    }
  };

  const handleDisconnect = (tabId) => {
    const tab = tabs.find(t => t.id === tabId);
    if (tab && tab._disconnect) tab._disconnect();
  };

  const handleFullscreen = (tabId) => {
    const tab = tabs.find(t => t.id === tabId);
    if (tab && tab._fitAddon && tab._fitAddon.current) {
      setTimeout(() => { try { tab._fitAddon.current.fit(); } catch {} }, 100);
    }
  };

  useEffect(() => {
    if (tabs.length === 0) addTab();
  }, []);

  const selectedHost = hosts.find(h => h.host === formData.host || h.name === formData.host);

  return (
    <div className="terminal-panel">
      <div className="terminal-tabs">
        {tabs.map(tab => (
          <TerminalTab key={tab.id} tab={tab} isActive={activeTabId === tab.id}
            onSelect={setActiveTabId} onClose={closeTab} />
        ))}
        {tabs.length < 5 && <button className="terminal-tab-add" onClick={addTab}>+</button>}
      </div>

      {tabs.map(tab => (
        <div key={tab.id} style={{ display: activeTabId === tab.id ? 'flex' : 'none', flexDirection: 'column', flex: 1 }}>
          {showForm === tab.id ? (
            <div className="terminal-connect-form">
              <div className="form-section-title">Connect to Host</div>
              <div className="form-group">
                <label className="form-label">Target Host</label>
                <select className="form-select" value={formData.host}
                  onChange={e => {
                    const h = hosts.find(x => x.name === e.target.value);
                    setFormData(prev => ({
                      ...prev, host: h ? h.host : e.target.value,
                      port: h ? (h.port || 22) : prev.port,
                    }));
                    if (h) {
                      api('GET', `/v1/dashboard/config/hosts/${encodeURIComponent(h.name)}`, null, token)
                        .then(cfg => { if (cfg && cfg.ssh_user) setFormData(prev => ({ ...prev, user: cfg.ssh_user })); })
                        .catch(() => {});
                    }
                  }}>
                  <option value="">Select a host...</option>
                  {(hosts || []).map(h => (
                    <option key={h.name} value={h.name}>{h.name} ({h.host})</option>
                  ))}
                </select>
              </div>
              <div className="form-row">
                <div className="form-group">
                  <label className="form-label">Username</label>
                  <input className="form-input" value={formData.user} onChange={e => setFormData(prev => ({ ...prev, user: e.target.value }))} placeholder="agent-op" />
                </div>
                <div className="form-group">
                  <label className="form-label">Port</label>
                  <input className="form-input" type="number" value={formData.port} onChange={e => setFormData(prev => ({ ...prev, port: parseInt(e.target.value) || 22 }))} />
                </div>
              </div>
              <div className="form-group">
                <label className="form-label">Auth Type</label>
                <select className="form-select" value={formData.auth_type} onChange={e => setFormData(prev => ({ ...prev, auth_type: e.target.value }))}>
                  <option value="certificate">Certificate (Clauth)</option>
                  <option value="password">Password</option>
                  <option value="key">SSH Key</option>
                </select>
              </div>
              {formData.auth_type === 'password' && (
                <div className="form-group">
                  <label className="form-label">Password</label>
                  <input className="form-input" type="password" value={formData.password} onChange={e => setFormData(prev => ({ ...prev, password: e.target.value }))} />
                </div>
              )}
              <div style={{ marginTop: '16px' }}>
                <button className="btn btn-green" onClick={() => handleConnect(tab.id)} disabled={!formData.host}>CONNECT</button>
              </div>
            </div>
          ) : (
            <>
              <div className="terminal-toolbar">
                <div className="terminal-toolbar-left">
                  <span style={{ color: tabStatuses[tab.id] === 'connected' ? 'var(--green)' : 'var(--text-dim)' }}>
                    {tabStatuses[tab.id] || 'idle'}
                  </span>
                </div>
                <div className="terminal-toolbar-right">
                  <button className="btn btn-revoke" onClick={() => handleDisconnect(tab.id)} style={{ fontSize: '9px', padding: '2px 8px' }}>DISCONNECT</button>
                  <button className="btn btn-cyan" onClick={() => setShowForm(tab.id)} style={{ fontSize: '9px', padding: '2px 8px' }}>NEW CONN</button>
                </div>
              </div>
              <TerminalInstance tab={tab} token={token} onStatusChange={handleStatusChange} />
            </>
          )}
        </div>
      ))}
    </div>
  );
}

function SettingsView({ summary, token, wsStatus }) {
  const [grantSettings, setGrantSettings] = useState({});
  const [grantLoading, setGrantLoading] = useState(true);
  const [permissions, setPermissions] = useState(null);
  const [permsLoading, setPermsLoading] = useState(true);

  useEffect(() => {
    (async () => {
      try {
        const data = await api('GET', '/v1/dashboard/settings/grants', null, token);
        setGrantSettings(data || {});
      } catch {}
      setGrantLoading(false);
    })();
  }, [token]);

  useEffect(() => {
    if (!token) return;
    (async () => {
      try {
        const data = await api('GET', '/v1/dashboard/permissions', null, token);
        setPermissions(data || null);
      } catch { setPermissions(null); }
      setPermsLoading(false);
    })();
  }, [token]);

  const updateGrantSettings = async (updates) => {
    const newSettings = { ...grantSettings, ...updates };
    setGrantSettings(newSettings);
    try {
      const result = await api('PUT', '/v1/dashboard/settings/grants', newSettings, token);
      setGrantSettings(result || newSettings);
    } catch (err) {
      console.error('Failed to update grant settings:', err);

  return (

                        <tr key={agentName}>
                          <td><span className="rbac-agent-name">{agentName}</span>
                            {ap.legacy_mode && <span className="badge badge-legacy" style={{ marginLeft: '6px', fontSize: '8px' }}>LEGACY</span>}
                          </td>
                          <td>{ap.dashboard ? <DashboardLevelBadge level={ap.dashboard} /> : <span style={{ color: 'var(--text-dim)' }}>-</span>}</td>
                          <td>
                            {ap.legacy_mode ? (
                              <span style={{ color: 'var(--amber)', fontSize: '10px' }}>unrestricted</span>
                            ) : ap.ssh && Object.keys(ap.ssh).length > 0 ? (
                              <div style={{ display: 'flex', flexDirection: 'column', gap: '2px' }}>
                                {Object.entries(ap.ssh).map(([target, cfg]) => (
                                  <div key={target} style={{ display: 'flex', alignItems: 'center', gap: '4px', flexWrap: 'wrap' }}>
                                    <span style={{ color: 'var(--cyan)', fontSize: '10px', fontWeight: 500 }}>{target}</span>
                                    <span className="rbac-pill-list">
                                      {(cfg.roles || []).map(r => <RoleBadge key={r} role={r} />)}
                                    </span>
                                  </div>
                                ))}
                              </div>
                            ) : <span style={{ color: 'var(--text-dim)' }}>-</span>}
                          </td>
                          <td>
                            {ap.legacy_mode ? (
                              <span style={{ color: 'var(--amber)', fontSize: '10px' }}>unrestricted</span>
                            ) : ap.services && Object.keys(ap.services).length > 0 ? (
                              <div style={{ display: 'flex', flexDirection: 'column', gap: '2px' }}>
                                {Object.entries(ap.services).map(([svc, cfg]) => (
                                  <div key={svc} style={{ display: 'flex', alignItems: 'center', gap: '4px', flexWrap: 'wrap' }}>
                                    <span style={{ color: 'var(--cyan)', fontSize: '10px', fontWeight: 500 }}>{svc}</span>
                                    <span className="rbac-pill-list">
                                      {(cfg.methods || []).map(m => <MethodBadge key={m} method={m} />)}
                                    </span>
                                  </div>
                                ))}
                              </div>
                            ) : <span style={{ color: 'var(--text-dim)' }}>-</span>}
                          </td>
                          <td>
                            {ap.legacy_mode ? (
                              <span style={{ color: 'var(--amber)', fontSize: '10px' }}>unrestricted</span>
                            ) : ap.remotes && Object.keys(ap.remotes).length > 0 ? (
                              <div style={{ display: 'flex', flexDirection: 'column', gap: '2px' }}>
                                {Object.entries(ap.remotes).map(([remote, cfg]) => (
                                  <span key={remote} style={{ color: 'var(--purple)', fontSize: '10px', fontWeight: 500 }}>
                                    {remote}{cfg.tools && cfg.tools.length > 0 ? ` (${cfg.tools.length})` : ''}
                                  </span>
                                ))}
                              </div>
                            ) : <span style={{ color: 'var(--text-dim)' }}>-</span>}
                          </td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>
            )}

            <div className="rbac-note">
              Role assignments are managed via <code>policy.yaml</code>. Reload policy with: <code>systemctl reload clauth-broker</code>
            </div>
          </>
        )}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════════
// TOKEN MODAL
// ═══════════════════════════════════════════════════════════════════════════════

function ThemePicker() {
  const [theme, setTheme] = useState(() => localStorage.getItem('clauth-theme') || 'dark');

  const applyTheme = (t) => {
    setTheme(t);
    localStorage.setItem('clauth-theme', t);
    document.documentElement.setAttribute('data-theme', t);
  };

  const themes = [
    { id: 'light', label: 'Light' },
    { id: 'dark', label: 'Dark' },
    { id: 'cyberpunk', label: 'Cyber' },
  ];

  return (
    <div className="theme-picker">
      {themes.map(t => (
        <button key={t.id} className={`theme-btn ${theme === t.id ? 'active' : ''}`} onClick={() => applyTheme(t.id)}>
          {t.label}
        </button>
      ))}
    </div>
  );
}

function TokenModal({ onSubmit, error }) {
  const [val, setVal] = useState('');
  const inputRef = useRef(null);
  useEffect(() => { if (inputRef.current) inputRef.current.focus(); }, []);

  const handleSubmit = (e) => {
    e.preventDefault();
    if (val.trim()) onSubmit(val.trim());
  };

  return (
    <div className="modal-overlay">
      <div className="modal-box">
        <h2>CLAUTH</h2>
        <div className="modal-sub">SSH CERTIFICATE BROKER</div>
        {error && <div className="modal-error">{error}</div>}
        <form onSubmit={handleSubmit}>
          <input ref={inputRef} type="password" placeholder="Enter API Token"
            value={val} onChange={e => setVal(e.target.value)}
            autoComplete="off" spellCheck="false" />
          <button type="submit" className="connect-btn">CONNECT</button>
        </form>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════════
// MAIN APP
// ═══════════════════════════════════════════════════════════════════════════════

function App() {
  const [token, setToken] = useState(() => localStorage.getItem('clauth_token') || '');
  const [tokenError, setTokenError] = useState('');
  const [view, setView] = useState('overview');
  const [now, setNow] = useState(Date.now());
  const [privacyMode, setPrivacyMode] = useState(false);

  const [summary, setSummary] = useState({});
  const [hosts, setHosts] = useState([]);
  const [sessions, setSessions] = useState([]);
  const [events, setEvents] = useState([]);
  const [loading, setLoading] = useState(true);

  const [wsStatus, setWsStatus] = useState('DISCONNECTED');
  const [activityAgent, setActivityAgent] = useState('');
  const wsRef = useRef(null);
  const wsRetriesRef = useRef(0);
  const wsTimerRef = useRef(null);
  const tickRef = useRef(null);
  const pollRef = useRef(null);

  // Privacy mode class
  useEffect(() => {
    if (privacyMode) document.body.classList.add('privacy-mode');
    else document.body.classList.remove('privacy-mode');
  }, [privacyMode]);

  // Document visibility detection for anti-screen-capture
  useEffect(() => {
    const handleVisibility = () => {
      if (document.hidden) document.body.classList.add('document-blurred');
      else document.body.classList.remove('document-blurred');
    };
    const handleBlur = () => document.body.classList.add('document-blurred');
    const handleFocus = () => document.body.classList.remove('document-blurred');
    document.addEventListener('visibilitychange', handleVisibility);
    window.addEventListener('blur', handleBlur);
    window.addEventListener('focus', handleFocus);
    return () => {
      document.removeEventListener('visibilitychange', handleVisibility);
      window.removeEventListener('blur', handleBlur);
      window.removeEventListener('focus', handleFocus);
    };
  }, []);

  // Clock tick every second
  useEffect(() => {
    tickRef.current = setInterval(() => setNow(Date.now()), 1000);
    return () => clearInterval(tickRef.current);
  }, []);

  // Fetch all data
  const fetchAll = useCallback(async () => {
    if (!token) return;
    try {
      const [sum, h, s] = await Promise.all([
        api('GET', '/v1/dashboard/summary', null, token),
        api('GET', '/v1/dashboard/hosts', null, token),
        api('GET', '/v1/dashboard/sessions', null, token),
      ]);
      setSummary(sum || {});
      setHosts((h || []).sort((a, b) => (a.name || '').localeCompare(b.name || '')));
      setSessions(s || []);
      setLoading(false);
    } catch (err) {
      if (err.message === 'UNAUTHORIZED') { setToken(''); setTokenError('Invalid or expired token'); }
      setLoading(false);
    }
  }, [token]);

  // Fetch live data (summary + sessions + hosts)
  const fetchLive = useCallback(async () => {
    if (!token) return;
    try {
      const [sum, h, s] = await Promise.all([
        api('GET', '/v1/dashboard/summary', null, token),
        api('GET', '/v1/dashboard/hosts', null, token),
        api('GET', '/v1/dashboard/sessions', null, token),
      ]);
      setSummary(sum || {});
      setHosts((h || []).sort((a, b) => (a.name || '').localeCompare(b.name || '')));
      setSessions(s || []);
    } catch (err) {
      if (err.message === 'UNAUTHORIZED') { setToken(''); setTokenError('Invalid or expired token'); }
    }
  }, [token]);

  // Initial fetch
  useEffect(() => { if (token) { setLoading(true); fetchAll(); } }, [token, fetchAll]);

  // Periodic refresh every 5s
  useEffect(() => {
    if (!token) return;
    pollRef.current = setInterval(fetchLive, 5000);
    return () => clearInterval(pollRef.current);
  }, [token, fetchLive]);

  // WebSocket connection
  const connectWs = useCallback(() => {
    if (!token) return;
    if (wsRef.current) { wsRef.current.close(); wsRef.current = null; }

    const url = `${getWsUrl()}/v1/events?token=${encodeURIComponent(token)}`;
    const ws = new WebSocket(url);
    wsRef.current = ws;

    ws.onopen = () => { setWsStatus('CONNECTED'); wsRetriesRef.current = 0; };

    ws.onmessage = (evt) => {
      try {
        const msg = JSON.parse(evt.data);
        setEvents(prev => [msg, ...prev].slice(0, 200));
        const t = (msg.type || '').toLowerCase();
        if (t.includes('grant') || t.includes('deny') || t.includes('revoke') || t.includes('expire') || t.includes('issued') || t.includes('toggle') || t.includes('task')) {
          fetchLive();
        }
      } catch {}
    };

    ws.onclose = () => {
      wsRef.current = null;
      setWsStatus('RECONNECTING');
      const delay = Math.min(30000, 1000 * Math.pow(2, wsRetriesRef.current));
      wsRetriesRef.current++;
      wsTimerRef.current = setTimeout(connectWs, delay);
    };

    ws.onerror = () => { ws.close(); };
  }, [token, fetchLive]);

  useEffect(() => {
    if (token) connectWs();
    return () => {
      if (wsRef.current) wsRef.current.close();
      if (wsTimerRef.current) clearTimeout(wsTimerRef.current);
    };
  }, [token, connectWs]);

  // Token submit
  const handleTokenSubmit = (t) => {
    setTokenError('');
    localStorage.setItem('clauth_token', t);
    setToken(t);
  };

  // Logout
  const handleLogout = () => {
    localStorage.removeItem('clauth_token');
    if (wsRef.current) wsRef.current.close();
    setToken(''); setSummary({}); setHosts([]);
    setSessions([]); setEvents([]); setWsStatus('DISCONNECTED');
  };

  // Toggle host
  const handleToggleHost = async (name) => {
    try {
      const result = await api('POST', `/v1/dashboard/hosts/${encodeURIComponent(name)}/toggle`, null, token);
      setHosts(prev => prev.map(h => h.name === name ? { ...h, access_enabled: result.access_enabled } : h));
    } catch (err) {
      if (err.message === 'UNAUTHORIZED') { setToken(''); setTokenError('Invalid or expired token'); }
    }
  };

  // Revoke session/grant
  const handleRevoke = async (serial, type) => {
    const endpoint = (type === 'service' || type === 'mcp')
      ? `/v1/dashboard/grants/${encodeURIComponent(serial)}/revoke`
      : `/v1/dashboard/sessions/${encodeURIComponent(serial)}/revoke`;
    try {
      await api('POST', endpoint, null, token);
      setSessions(prev => prev.map(s => s.serial === serial ? { ...s, status: 'revoked' } : s));
      fetchLive();
    } catch (err) {
      if (err.message === 'UNAUTHORIZED') { setToken(''); setTokenError('Invalid or expired token'); }
      console.error('Revoke failed:', err);
    }
  };

  // No token - show modal
  if (!token) return <TokenModal onSubmit={handleTokenSubmit} error={tokenError} />;

  const navItems = [
    { id: 'overview', label: 'Overview', icon: '\u25c8', group: 'OVERVIEW' },
    { id: 'hosts', label: 'Hosts', icon: '\u2b21', group: 'INFRASTRUCTURE' },
    { id: 'services', label: 'Services', icon: '\u2394', group: 'INFRASTRUCTURE' },
    { id: 'mcp-servers', label: 'MCP Servers', icon: '\u2b95', group: 'INFRASTRUCTURE' },
    { id: 'agents', label: 'Agents', icon: '\u25ce', group: 'MONITOR' },
    { id: 'activity', label: 'Activity', icon: '\u2261', group: 'MONITOR' },
    { id: 'sessions', label: 'Sessions', icon: '\u27d0', group: 'MONITOR' },
    { id: 'audit', label: 'Audit Log', icon: '\u25a4', group: 'MONITOR' },
    { id: 'tasks', label: 'Tasks', icon: '\u29C9', group: 'MONITOR' },
    { id: 'terminal', label: 'Terminal', icon: '\u2318', group: 'TOOLS' },
    { id: 'settings', label: 'Settings', icon: '\u2699', group: 'TOOLS' },
  ];

  const viewTitles = {
    overview: 'System Overview',
    hosts: 'Host Management',
    agents: 'Agent Registry',
    activity: 'Activity Monitor',
    sessions: 'Session Control',
    audit: 'Audit Log',
    tasks: 'Task Management',
    terminal: 'Terminal Access',
    services: 'Service Configuration',
    'mcp-servers': 'MCP Servers',
    settings: 'Settings',
  };

  const wsColors = { CONNECTED: 'green', RECONNECTING: 'amber', DISCONNECTED: 'red' };

  return (
    <div className="app-layout">
      <div className="sidebar">
        <div className="sidebar-brand">
          <h1>CLAUTH</h1>
          <div className="subtitle">SSH CERTIFICATE BROKER</div>
        </div>
        <div className="sidebar-nav">
          {(() => {
            let lastGroup = '';
            return navItems.map(n => {
              const showGroup = n.group !== lastGroup;
              lastGroup = n.group;
              return (
                <React.Fragment key={n.id}>
                  {showGroup && <div className="nav-group-label">{n.group}</div>}
                  <div className={`nav-item ${view === n.id ? 'active' : ''}`} onClick={() => { if (n.id !== 'activity') setActivityAgent(''); setView(n.id); }}>
                    <span className="nav-icon">{n.icon}</span>
                    {n.label}
                  </div>
                </React.Fragment>
              );
            });
          })()}
        </div>
        <SidebarStats summary={summary} />
        <div className="sidebar-footer">
          <div className="broker-info">
            {summary.hostname && <div>{summary.hostname}</div>}
            {summary.ip && <div className="broker-ip">{summary.ip}</div>}
            {summary.uptime && <div>Up: {summary.uptime}</div>}
          </div>
          <div>Broker: {summary.broker_status || 'unknown'}</div>
          <div>CA: {summary.ca_key_status || 'unknown'}</div>
          <div>Signer: {summary.signer_ok ? 'OK' : 'N/A'}</div>
          <ThemePicker />
          <div style={{ marginTop: '8px', fontSize: '9px', color: 'var(--text-dim)', opacity: 0.5 }}>Dashboard v4.1 // 2026-03-11</div>
        </div>
      </div>

      <div className="main-area">
        <div className="topbar">
          <div className="topbar-title">{viewTitles[view]}</div>
          <div className="topbar-right">
            <button className={`privacy-toggle ${privacyMode ? 'active' : ''}`} onClick={() => setPrivacyMode(!privacyMode)}>
              {privacyMode ? '\u25c9' : '\u25cb'} PRIVACY
            </button>
            <div className="conn-status">
              <span className={`conn-dot ${wsColors[wsStatus]}`} />
              <span style={{ color: wsStatus === 'CONNECTED' ? 'var(--green)' : wsStatus === 'RECONNECTING' ? 'var(--amber)' : 'var(--red)' }}>
                {wsStatus}
              </span>
            </div>
            <button className="logout-btn" onClick={handleLogout}>DISCONNECT</button>
          </div>
        </div>
        <div className="content" style={view === 'terminal' ? { padding: 0, display: 'flex', flexDirection: 'column' } : {}}>
          {loading ? (
            <div className="loading">Connecting to broker...</div>
          ) : (
            <>
              {view === 'overview' && <OverviewView summary={summary} sessions={sessions} hosts={hosts} events={events} now={now} onToggleHost={handleToggleHost} onRevoke={handleRevoke} token={token} />}
              {view === 'hosts' && <HostsView hosts={hosts} sessions={sessions} now={now} onToggleHost={handleToggleHost} token={token} onRefresh={fetchAll} />}
              {view === 'agents' && <AgentsView sessions={sessions} summary={summary} now={now} token={token} onViewActivity={(agentName) => { setActivityAgent(agentName); setView('activity'); }} />}
              {view === 'activity' && <ActivityView token={token} initialAgent={activityAgent} />}
              {view === 'sessions' && <SessionsView sessions={sessions} now={now} onRevoke={handleRevoke} />}
              {view === 'audit' && <AuditView token={token} events={events} />}
              {view === 'tasks' && <TasksView token={token} now={now} />}
              {view === 'terminal' && <TerminalView hosts={hosts} token={token} />}
              {view === 'services' && <ServicesView token={token} />}
              {view === 'mcp-servers' && <MCPServersView token={token} />}
              {view === 'settings' && <SettingsView summary={summary} token={token} wsStatus={wsStatus} />}
            </>
          )}
        </div>
      </div>
    </div>
  );
}

// MOUNT
// ═══════════════════════════════════════════════════════════════════════════════

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
