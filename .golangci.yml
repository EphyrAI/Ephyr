run:
  timeout: 5m

linters:
  enable:
    - govet
    - ineffassign
    - staticcheck
    - unused
    - bodyclose
    - durationcheck
    - errname
    - errorlint
    - makezero
    - nilerr
    - predeclared
    - reassign
    - unconvert
  disable:
    - errcheck
    - depguard
    - unparam
    - gosimple

linters-settings:
  staticcheck:
    checks: ["all", "-QF*", "-ST1005"]

issues:
  exclude-use-default: true
  max-issues-per-linter: 50
  max-same-issues: 10
  exclude-rules:
    - path: _test\.go
      linters:
        - errorlint
    - linters:
        - staticcheck
      text: "S1000"
    - linters:
        - staticcheck
      text: "S1009"
    - linters:
        - staticcheck
      text: "S1017"
