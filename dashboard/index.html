// ═══════════════════════════════════════════════════════════════════════════════
// 1. OVERVIEW VIEW
// ═══════════════════════════════════════════════════════════════════════════════

function OverviewView({ summary, sessions, hosts, events, now, onToggleHost, onRevoke, token }) {
  const activeSessions = (sessions || []).filter(s => s.status === 'active');
  const [recentActivity, setRecentActivity] = useState([]);
  const [actSummary, setActSummary] = useState({});
  const [remotes, setRemotes] = useState([]);
  useEffect(() => {
    (async () => {
      try {
        const data = await api('GET', '/v1/dashboard/remotes', null, token);
        setRemotes((data || []).sort((a, b) => (a.name || '').localeCompare(b.name || '')));
      } catch {}
    })();
  }, [token]);
  const [services, setServices] = useState([]);
  useEffect(() => {
    (async () => {
      try {
        const data = await api('GET', '/v1/dashboard/services', null, token);
        setServices((data || []).sort((a, b) => (a.name || '').localeCompare(b.name || '')));
      } catch {}
    })();
  }, [token]);

  useEffect(() => {
    if (!token) return;
    const fetchOvActivity = async () => {
      try {
        const [entries, sumData] = await Promise.all([
          api('GET', '/v1/dashboard/activity?limit=50', null, token),
          api('GET', '/v1/dashboard/activity/summary', null, token),
        ]);
        setRecentActivity(entries || []);
        setActSummary(sumData || {});
      } catch {}
    };
    fetchOvActivity();
    const iv = setInterval(fetchOvActivity, 5000);
    return () => clearInterval(iv);
  }, [token]);

  const handleToggleService = async (name) => {
    try {
      const result = await api('POST', `/v1/dashboard/services/${encodeURIComponent(name)}/toggle`, null, token);
      setServices(prev => prev.map(s => s.name === name ? { ...s, enabled: result.enabled } : s));
    } catch {}
  };

  const handleToggleRemote = async (name) => {
    try {
      const result = await api('POST', `/v1/dashboard/remotes/${encodeURIComponent(name)}/toggle`, null, token);
      setRemotes(prev => prev.map(r => r.name === name ? { ...r, enabled: result.enabled } : r));
    } catch {}
  };

  return (
    <div>
      {/* Row 1: Access metrics */}
      <div className="stats-row" style={{ marginBottom: '12px', gridTemplateColumns: 'repeat(3, 1fr)' }}>
        <div className="stat-card green">
          <div className="stat-label">Access Granted</div>
          <div className="stat-value green">{summary.total_granted || 0}</div>
          <div className="stat-sub">total certificates</div>
        </div>
        <div className="stat-card amber">
          <div className="stat-label">Pending</div>
          <div className="stat-value amber">{summary.pending_requests || 0}</div>
          <div className="stat-sub">awaiting approval</div>
        </div>
        <div className="stat-card red">
          <div className="stat-label">Denied</div>
          <div className="stat-value red">{summary.total_denied || 0}</div>
          <div className="stat-sub">of {(summary.total_granted || 0) + (summary.total_denied || 0)} total</div>
        </div>
      </div>

      {/* Row 2: Active resources */}
      <div className="stats-row" style={{ marginBottom: '16px', gridTemplateColumns: 'repeat(4, 1fr)' }}>
        <div className="stat-card green">
          <div className="stat-label">Active Agents</div>
          <div className="stat-value green">{summary.agents_active || 0}</div>
          <div className="stat-sub">connected</div>
        </div>
        <div className="stat-card cyan">
          <div className="stat-label">Active Sessions</div>
          <div className="stat-value cyan">{summary.active_certs || 0}</div>
          <div className="stat-sub">{(() => {
            const ss = activeSessions || [];
            const sshCount = ss.filter(s => !s.type || s.type === 'ssh_cert').length;
            const svcCount = ss.filter(s => s.type === 'service').length;
            const mcpCount = ss.filter(s => s.type === 'mcp').length;
            const parts = [];
            if (sshCount > 0) parts.push(`${sshCount} SSH`);
            if (svcCount > 0) parts.push(`${svcCount} Service`);
            if (mcpCount > 0) parts.push(`${mcpCount} MCP`);
            return parts.length > 0 ? parts.join(' \u00b7 ') : 'certificates';
          })()}</div>
        </div>
        <div className="stat-card amber">
          <div className="stat-label">Hosts Online</div>
          <div className="stat-value amber">{summary.hosts_online || 0}</div>
          <div className="stat-sub">of {summary.hosts_enabled || 0} enabled</div>
        </div>
        <div className="stat-card purple">
          <div className="stat-label">Active Tasks</div>
          <div className="stat-value purple">{summary.tasks_active || 0}</div>
          <div className="stat-sub">{summary.tasks_delegated || 0} delegated</div>
        </div>
      </div>

      {/* 3 management panels: Hosts | Services | MCP Servers */}
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: '12px', marginBottom: '16px' }}>
        {/* Hosts panel */}
        <div className="panel">
          <div className="panel-header">
            <span>Hosts</span>
            <span className="panel-count" style={{ fontSize: '16px', fontWeight: 700, color: 'var(--amber)' }}>{(hosts || []).filter(h => h.access_enabled).length}<span style={{ fontSize: '11px', fontWeight: 400, color: 'var(--text-dim)' }}>/{(hosts || []).length}</span></span>
          </div>
          <div className="panel-body" style={{ maxHeight: '240px', overflowY: 'auto' }}>
            {(hosts || []).length === 0 ? (
              <div className="empty-state">No hosts configured</div>
            ) : (hosts || []).map(h => (
              <div key={h.name} className={`host-item${h.active_sessions > 0 ? ' item-active' : ''}${!h.access_enabled ? ' item-disabled' : ''}`}>
                <div className="host-left">
                  <StatusDot status={h.status || (h.access_enabled ? 'online' : 'offline')} />
                  <div>
                    <div className="host-name">{h.name}</div>
                    <div className="host-meta">
                      {h.vlan > 0 && <span className={getVlanClass(h.vlan)}>V{h.vlan}</span>}
                      {' \u00b7 '}
                      <span style={{ color: 'var(--cyan)' }}>{h.host}</span>
                    </div>
                  </div>
                </div>
                <ToggleSwitch checked={h.access_enabled} onChange={() => onToggleHost(h.name)} />
              </div>
            ))}
          </div>
        </div>

        {/* Services panel */}
        <div className="panel">
          <div className="panel-header">
            <span>Services</span>
            <span className="panel-count" style={{ fontSize: '16px', fontWeight: 700, color: 'var(--cyan)' }}>{services.filter(s => s.enabled !== false).length}<span style={{ fontSize: '11px', fontWeight: 400, color: 'var(--text-dim)' }}>/{services.length}</span></span>
          </div>
          <div className="panel-body" style={{ maxHeight: '240px', overflowY: 'auto' }}>
            {services.length === 0 ? (
              <div className="empty-state">No services configured</div>
            ) : services.map(s => (
              <div key={s.name} className={`host-item${s.enabled === false ? ' item-disabled' : ' item-active-cyan'}`}>
                <div className="host-left">
                  <StatusDot status="online" />
                  <div>
                    <div className="host-name">{s.name}</div>
                    <div className="host-meta">
                      <span style={{ color: 'var(--cyan)', fontSize: '10px' }}>{s.url_prefix || '-'}</span>
                    </div>
                  </div>
                </div>
                <div style={{ display: 'flex', alignItems: 'center', gap: '8px' }}>
                  <AuthTypeBadge authType={s.auth_type || 'none'} />
                  <ToggleSwitch checked={s.enabled !== false} onChange={() => handleToggleService(s.name)} />
                </div>
              </div>
            ))}
          </div>
        </div>

        {/* MCP Servers panel */}
        <div className="panel">
          <div className="panel-header">
            <span>MCP Servers</span>
            <span className="panel-count" style={{ fontSize: '16px', fontWeight: 700, color: 'var(--purple)' }}>{remotes.filter(r => r.status === 'connected').length}<span style={{ fontSize: '11px', fontWeight: 400, color: 'var(--text-dim)' }}>/{remotes.length}</span></span>
          </div>
          <div className="panel-body" style={{ maxHeight: '240px', overflowY: 'auto' }}>
            {remotes.length === 0 ? (
              <div className="empty-state">No MCP servers configured</div>
            ) : remotes.map(r => (
              <div key={r.name} className={`host-item${r.status === 'connected' ? ' item-active-purple' : r.enabled === false ? ' item-disabled' : ''}`}>
                <div className="host-left">
                  <StatusDot status={r.status === 'connected' ? 'online' : r.status === 'error' ? 'error' : 'offline'} />
                  <div>
                    <div className="host-name">{r.name}</div>
                    <div className="host-meta">
                      <span style={{ color: 'var(--text-dim)', fontSize: '10px' }}>{r.tool_count || 0} tools &bull; {r.resource_count || 0} resources</span>
                    </div>
                  </div>
                </div>
                <div style={{ display: 'flex', alignItems: 'center', gap: '8px' }}>
                  <RemoteStatusBadge status={r.status} />
                  <ToggleSwitch checked={r.enabled !== false} onChange={() => handleToggleRemote(r.name)} />
                </div>
              </div>
            ))}
          </div>
        </div>
      </div>

      {/* Active Sessions panel - grouped by agent+target */}
      <div className="panel" style={{ marginBottom: '16px' }}>
        <div className="panel-header">
          <span>Active Sessions</span>
          <span className="panel-count">{activeSessions.length}</span>
        </div>
        <div className="panel-body" style={{ maxHeight: '320px', overflowY: 'auto' }}>
          {(() => {
            if (activeSessions.length === 0 && recentActivity.filter(a => (a.type || a.action_type) === 'http_proxy' || (a.type || a.action_type) === 'mcp_call').length === 0) {
              return <div className="empty-state">No active sessions</div>;
            }
            // Group active sessions by agent+target
            const groups = {};
            activeSessions.forEach(s => {
              const key = `${s.agent}\u2192${s.target}`;
              if (!groups[key]) groups[key] = { agent: s.agent, target: s.target, certs: [] };
              groups[key].certs.push(s);
            });
            // Sort groups by earliest-expiring cert first
            const sortedGroups = Object.values(groups).sort((a, b) => {
              const aMin = Math.min(...a.certs.map(c => parseTTL(c.expires_at, now)));
              const bMin = Math.min(...b.certs.map(c => parseTTL(c.expires_at, now)));
              return aMin - bMin;
            });
            // Recent proxy & MCP activity
            const proxyMcpActivity = (recentActivity || []).filter(a => (a.type || a.action_type) === 'http_proxy' || (a.type || a.action_type) === 'mcp_call').slice(0, 5);
            return (
              <>
                {sortedGroups.map(group => (
                  <div key={`${group.agent}-${group.target}`} style={{ marginBottom: '8px', border: '1px solid var(--border)', borderRadius: '4px', background: 'rgba(0,0,0,0.2)', overflow: 'hidden' }}>
                    <div style={{ display: 'flex', alignItems: 'center', gap: '6px', padding: '8px 12px', borderBottom: '1px solid var(--border)', background: 'rgba(0,0,0,0.15)' }}>
                      <span style={{ color: 'var(--green)', fontWeight: 600, fontSize: '12px' }}>{group.agent}</span>
                      <span style={{ color: 'var(--text-dim)' }}>&rarr;</span>
                      <span style={{ color: 'var(--cyan)', fontWeight: 600, fontSize: '12px' }}>{group.target}</span>
                      <span style={{ marginLeft: 'auto', fontSize: '10px', color: 'var(--text-dim)' }}>{group.certs.length} cert{group.certs.length !== 1 ? 's' : ''}</span>
                    </div>
                    {group.certs.map(s => {
                      const maxTTL = computeMaxTTL(s.issued_at, s.expires_at);
                      const remaining = parseTTL(s.expires_at, now);
                      return (
                        <div key={s.serial} style={{ display: 'flex', alignItems: 'center', gap: '8px', padding: '6px 12px', borderBottom: '1px solid rgba(255,255,255,0.03)' }}>
                          <GrantTypeBadge type={s.type || 'ssh_cert'} />
                          <RoleBadge role={s.role} />
                          <div style={{ flex: 1 }}>
                            <TTLBar remaining={remaining} maxTTL={maxTTL} />
                          </div>
                          <button className="btn btn-revoke" onClick={() => onRevoke(s.serial, s.type || 'ssh_cert')} style={{ fontSize: '9px', padding: '2px 8px' }}>REVOKE</button>
                        </div>
                      );
                    })}
                  </div>
                ))}
                {proxyMcpActivity.length > 0 && (
                  <div style={{ marginTop: '8px', borderTop: '1px solid var(--border)', paddingTop: '8px' }}>
                    <div style={{ fontSize: '10px', color: 'var(--text-dim)', textTransform: 'uppercase', letterSpacing: '1px', marginBottom: '6px', fontWeight: 600 }}>Recent Proxy &amp; MCP</div>
                    {proxyMcpActivity.map((a, i) => (
                      <div key={i} style={{ display: 'flex', alignItems: 'center', gap: '8px', padding: '4px 8px', fontSize: '11px', borderBottom: '1px solid rgba(255,255,255,0.03)' }}>
                        <span style={{ color: 'var(--green)', fontWeight: 600, minWidth: '50px' }}>{a.agent || '-'}</span>
                        <span style={{ color: 'var(--text-dim)' }}>&rarr;</span>
                        <span style={{ color: 'var(--cyan)' }}>{a.target || a.service || '-'}</span>
                        <ActionTypeBadge type={a.type || a.action_type} />
                        <span style={{ color: 'var(--text-dim)', fontSize: '10px', marginLeft: 'auto' }}>{relativeTime(a.timestamp)}</span>
                      </div>
                    ))}
                  </div>
                )}
              </>
            );
          })()}
        </div>
      </div>

      {/* Live Event Feed (consolidated) - merges recentActivity + WebSocket events */}
      <div className="overview-activity-section">
        <div className="overview-activity-header">
          <span className="panel-header" style={{ border: 'none', padding: 0 }}>
            <span>Live Event Feed</span>
          </span>
          <div className="overview-activity-stats">
            <span>Exec: <span style={{ color: 'var(--green)', fontWeight: 600 }}>{actSummary.total_exec || 0}</span></span>
            <span>Proxy: <span style={{ color: 'var(--cyan)', fontWeight: 600 }}>{actSummary.total_proxy || 0}</span></span>
            <span>MCP: <span style={{ color: 'var(--purple)', fontWeight: 600 }}>{actSummary.total_mcp || 0}</span></span>
            <span>Errors: <span style={{ color: 'var(--red)', fontWeight: 600 }}>{actSummary.total_errors || 0}</span></span>
          </div>
        </div>
        <div className="overview-activity-body">
          {(() => {
            // Normalize recentActivity entries
            const activityNorm = (recentActivity || []).map(e => ({
              timestamp: e.timestamp,
              action_type: e.action_type || e.type || 'unknown',
              agent: e.agent || '-',
              target: e.target || e.service || '-',
              details: typeof e.details === 'object' && e.details !== null ? JSON.stringify(e.details) : (e.details || e.command || e.url || ''),
              status: e.status === 'error' || e.success === false || e.error ? 'error' : (e.status || 'success'),
              _source: 'activity',
            }));
            // Normalize WebSocket events
            const wsNorm = (events || []).map(e => {
              const data = e.data || {};
              const evType = e.type || e.event_type || 'info';
              const isToggle = evType.includes('toggle');
              const toggleName = data.host || data.name || data.service || data.remote || '';
              const toggleState = data.state || (data.enabled === 'true' ? 'enabled' : data.enabled === 'false' ? 'disabled' : '') || data.action || '';
              return {
                timestamp: e.timestamp,
                action_type: evType,
                agent: data.agent || e.agent || (isToggle ? 'dashboard' : '-'),
                target: isToggle ? toggleName : (data.target || e.target || '-'),
                details: isToggle ? (toggleName + ' ' + toggleState).trim() : (data.reason || data.role || data.message || ''),
                status: (evType).includes('denied') ? 'error' : 'success',
                _source: 'ws',
              };
            });
            // Merge and deduplicate (by timestamp+action_type+agent, prefer activity source)
            const seen = new Set();
            const all = [];
            activityNorm.forEach(e => {
              const key = `${e.timestamp}|${e.action_type}|${e.agent}`;
              seen.add(key);
              all.push(e);
            });
            wsNorm.forEach(e => {
              const key = `${e.timestamp}|${e.action_type}|${e.agent}`;
              if (!seen.has(key)) {
                seen.add(key);
                all.push(e);
              }
            });
            // Sort descending by timestamp, take top 8
            all.sort((a, b) => new Date(b.timestamp || 0).getTime() - new Date(a.timestamp || 0).getTime());
            // Filter to last 5 minutes
            const fiveMinAgo = Date.now() - 5 * 60 * 1000;
            const merged = all.filter(e => new Date(e.timestamp || 0).getTime() > fiveMinAgo);
            if (merged.length === 0) {
              return <div className="empty-state" style={{ padding: '16px' }}>No recent activity</div>;
            }
            return merged.map((e, i) => (
              <div key={i} className="overview-compact-entry">
                <span style={{ color: 'var(--text-dim)', fontSize: '10px', minWidth: '60px' }}>{relativeTime(e.timestamp)}</span>
                <ActionTypeBadge type={e.action_type} />
                <span style={{ color: 'var(--green)', fontWeight: 600 }}>{e.agent}</span>
                <span style={{ color: 'var(--text-dim)' }}>&rarr;</span>
                <span style={{ color: 'var(--cyan)' }}>{e.target}</span>
                <span style={{ color: 'var(--text-dim)', flex: 1, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>
                  {e.details}
                </span>
                <ActivityStatusBadge status={e.status} />
              </div>
            ));
          })()}
        </div>
      </div>
    </div>
  );
}

// 2. HOSTS VIEW (with config slide-out)

function HostConfigPanel({ host, open, onClose, onSave, token, roles }) {
  const [config, setConfig] = useState(null);
  const [loading, setLoading] = useState(false);
  const [saving, setSaving] = useState(false);
  const [error, setError] = useState('');

  useEffect(() => {
    if (open && host) {
      setLoading(true);
      setError('');
      api('GET', `/v1/dashboard/config/hosts/${encodeURIComponent(host.name)}`, null, token)
        .then(data => { setConfig({...data, user: data.ssh_user || "", password: data.ssh_password || "", auth_type: data.auth_type || "password", ssh_key: data.ssh_key_path || ""}); setLoading(false); })
        .catch(err => {
          setConfig({
            name: host.name, host: host.host || '', port: host.port || 22,
            vlan: host.vlan || '', os: host.os || '', description: host.description || '',
            user: '', auth_type: 'key', password: '', ssh_key: '',
            allowed_roles: host.allowed_roles || [],
            default_ttl: host.default_ttl || '5m', max_ttl: host.max_ttl || '15m',
            auto_approve: host.auto_approve || false,
          });
          setLoading(false);
        });
    }
  }, [open, host, token]);

  const handleFieldChange = (field, value) => {
    setConfig(prev => ({ ...prev, [field]: value }));
  };

  const handleRoleToggle = (role) => {
    setConfig(prev => {
      const roles = prev.allowed_roles || [];
      if (roles.includes(role)) return { ...prev, allowed_roles: roles.filter(r => r !== role) };
      return { ...prev, allowed_roles: [...roles, role] };
    });
  };

  const handleSave = async () => {
    setSaving(true);
    setError('');
    try {
      const payload = {...config, ssh_user: config.user, ssh_password: config.password !== "***" ? config.password : undefined}; await api('PUT', `/v1/dashboard/config/hosts/${encodeURIComponent(host.name)}`, payload, token);
      if (onSave) onSave();
      onClose();
    } catch (err) {
      setError(err.message);
    }
    setSaving(false);
  };

  if (!open) return null;

  return (
    <>
      <div className={`slideout-overlay ${open ? 'open' : ''}`} onClick={onClose} />
      <div className={`slideout-panel ${open ? 'open' : ''}`}>
        <div className="slideout-header">
          <h3>Configure: {host?.name}</h3>
          <button className="slideout-close" onClick={onClose}>&times;</button>
        </div>
        <div className="slideout-body">
          {loading ? (
            <div className="loading">Loading config...</div>
          ) : config ? (
            <>
              {error && <div className="modal-error" style={{ marginBottom: '16px' }}>{error}</div>}

              <div className="form-section-title">Host Details</div>
              <div className="form-row">
                <div className="form-group">
                  <label className="form-label">Name</label>
                  <input className="form-input" value={config.name || ''} readOnly style={{ opacity: 0.5 }} />
                </div>
                <div className="form-group">
                  <label className="form-label">VLAN</label>
                  <input className="form-input" value={config.vlan || ''} onChange={e => handleFieldChange('vlan', e.target.value)} />
                </div>
              </div>
              <div className="form-row">
                <div className="form-group">
                  <label className="form-label">IP / Hostname</label>
                  <input className="form-input" value={config.host || ''} onChange={e => handleFieldChange('host', e.target.value)} />
                </div>
                <div className="form-group">
                  <label className="form-label">Port</label>
                  <input className="form-input" type="number" value={config.port || 22} onChange={e => handleFieldChange('port', parseInt(e.target.value) || 22)} />
                </div>
              </div>
              <div className="form-group">
                <label className="form-label">OS</label>
                <input className="form-input" value={config.os || ''} onChange={e => handleFieldChange('os', e.target.value)} />
              </div>
              <div className="form-group">
                <label className="form-label">Description</label>
                <input className="form-input" value={config.description || ''} onChange={e => handleFieldChange('description', e.target.value)} />
              </div>

              <div className="form-section-title">SSH Credentials</div>
              <div className="form-group">
                <label className="form-label">Username</label>
                <input className="form-input" value={config.user || ''} onChange={e => handleFieldChange('user', e.target.value)} placeholder="e.g. agent-op" />
              </div>
              <div className="form-group">
                <label className="form-label">Auth Type</label>
                <select className="form-select" value={config.auth_type || 'key'} onChange={e => handleFieldChange('auth_type', e.target.value)}>
                  <option value="key">SSH Key</option>
                  <option value="password">Password</option>
                  <option value="certificate">Certificate</option>
                </select>
              </div>
              {config.auth_type === 'password' && (
                <div className="form-group"><label className="form-label">Password</label><input className="form-input" type="password" value={config.password === "***" ? "" : (config.password || "")} onChange={e => handleFieldChange("password", e.target.value)} placeholder={config.password === "***" ? "set - enter new to change" : "Enter password"} /></div>
              )}
              {config.auth_type === 'key' && (
                <div className="form-group"><label className="form-label">SSH Key Path</label><input className="form-input" value={config.ssh_key || ""} onChange={e => handleFieldChange("ssh_key", e.target.value)} placeholder="/path/to/key" /></div>
              )}

              <div className="form-section-title">Roles</div>
              <div style={{ display: 'flex', flexWrap: 'wrap', gap: '12px' }}>
                {(roles || []).map(r => (
                  <label key={r} className="form-checkbox">
                    <input type="checkbox" checked={(config.allowed_roles || []).includes(r)} onChange={() => handleRoleToggle(r)} />
                    {r}
                  </label>
                ))}
              </div>

              <div className="form-section-title">TTL Settings</div>
              <div className="form-row">
                <div className="form-group">
                  <label className="form-label">Default TTL</label>
                  <input className="form-input" value={config.default_ttl || ''} onChange={e => handleFieldChange('default_ttl', e.target.value)} placeholder="5m" />
                </div>
                <div className="form-group">
                  <label className="form-label">Max TTL</label>
                  <input className="form-input" value={config.max_ttl || ''} onChange={e => handleFieldChange('max_ttl', e.target.value)} placeholder="15m" />
                </div>
              </div>
              <div className="form-group" style={{ marginTop: '8px' }}>
                <label className="form-checkbox">
                  <input type="checkbox" checked={config.auto_approve || false} onChange={e => handleFieldChange('auto_approve', e.target.checked)} />
                  Auto-approve requests
                </label>
              </div>
            </>
          ) : null}
        </div>
        <div className="slideout-footer">
          <button className="btn btn-amber" onClick={onClose}>CANCEL</button>
          <button className="btn btn-green" onClick={handleSave} disabled={saving}>
            {saving ? 'SAVING...' : 'SAVE'}
          </button>
        </div>
      </div>
    </>
  );
}

function HostsView({ hosts, sessions, now, onToggleHost, token, onRefresh }) {
  const [configHost, setConfigHost] = useState(null);
  const [roles, setRoles] = useState([]);
  const [permissions, setPermissions] = useState(null);

  useEffect(() => {
    api('GET', '/v1/dashboard/config/roles', null, token)
      .then(data => { if (Array.isArray(data)) setRoles(data.map(r => typeof r === 'string' ? r : r.name)); })
      .catch(() => {});
  }, [token]);

  useEffect(() => {
    if (!token) return;
    const fetchPerms = async () => {
      try {
        const data = await api('GET', '/v1/dashboard/permissions', null, token);
        setPermissions(data || null);
      } catch { setPermissions(null); }
    };
    fetchPerms();
    const iv = setInterval(fetchPerms, 30000);
    return () => clearInterval(iv);
  }, [token]);

  // Build host-to-agents map from permissions
  const hostAgentMap = useMemo(() => {
    if (!permissions || !permissions.agents) return {};
    const map = {};
    Object.entries(permissions.agents).forEach(([agentName, ap]) => {
      if (ap.legacy_mode || !ap.ssh) return;
      Object.entries(ap.ssh).forEach(([target, cfg]) => {
        if (!map[target]) map[target] = [];
        map[target].push({ agent: agentName, roles: cfg.roles || [], auto_approve: cfg.auto_approve });
      });
    });
    return map;
  }, [permissions]);

  return (
    <>
      <div className="hosts-grid">
        {(hosts || []).length === 0 ? (
          <div className="empty-state" style={{ gridColumn: '1 / -1' }}>No hosts configured</div>
        ) : (hosts || []).map(h => {
          const hostSessions = (sessions || []).filter(s => s.target === h.name && s.status === 'active');
          return (
            <div key={h.name} className={`host-card${h.active_sessions > 0 ? ' item-active' : ''}`}>
              <div className="host-card-top">
                <div className="host-card-name">
                  <StatusDot status={h.status || (h.access_enabled ? 'online' : 'offline')} />
                  <h3>{h.name}</h3>
                </div>
                <button className={`access-btn ${h.access_enabled ? 'on' : 'off'}`} onClick={() => onToggleHost(h.name)}>
                  {h.access_enabled ? 'ACCESS ON' : 'ACCESS OFF'}
                </button>
              </div>
              {h.description && <div className="host-card-desc">{h.description}</div>}
              <div className="host-card-meta">
                {h.vlan > 0 && <span><span className={getVlanClass(h.vlan)}>VLAN {h.vlan}</span></span>}
                <span><span style={{ color: 'var(--cyan)' }}>{h.host}:{h.port || 22}</span></span>
                {h.os && <span>{h.os}</span>}
                {h.allowed_roles && <span>{h.allowed_roles.map(r => <RoleBadge key={r} role={r} />)}</span>}
                {h.auto_approve && <span style={{ color: 'var(--green)' }}>AUTO-APPROVE</span>}
              </div>
              <div className="host-card-sessions">
                <div className="sessions-label">{hostSessions.length} Active Session{hostSessions.length !== 1 ? 's' : ''}</div>
                {hostSessions.map(s => {
                  const remaining = parseTTL(s.expires_at, now);
                  return (
                    <div key={s.serial} style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '4px 0', fontSize: '11px' }}>
                      <span><span style={{ color: 'var(--green)' }}>{s.agent}</span> <span style={{ color: 'var(--text-dim)' }}>as</span> <RoleBadge role={s.role} /></span>
                      <span className={`ttl-text ${ttlClass(remaining, computeMaxTTL(s.issued_at, s.expires_at))}`}>{formatTTL(remaining)}</span>
                    </div>
                  );
                })}
              </div>
              {/* Agent Access from RBAC */}
              {hostAgentMap[h.name] && hostAgentMap[h.name].length > 0 && (
                <div style={{ borderTop: '1px solid var(--border)', paddingTop: '8px', marginTop: '8px' }}>
                  <div style={{ fontSize: '10px', color: 'var(--text-dim)', textTransform: 'uppercase', letterSpacing: '0.5px', marginBottom: '6px' }}>
                    Agent Access
                  </div>
                  {hostAgentMap[h.name].map(entry => (
                    <div key={entry.agent} className="rbac-target-row">
                      <span className="rbac-agent-name">{entry.agent}</span>
                      <span className="rbac-pill-list">
                        {entry.roles.map(r => <RoleBadge key={r} role={r} />)}
                      </span>
                      {entry.auto_approve && <span style={{ fontSize: '9px', color: 'var(--green)' }}>AUTO</span>}
                    </div>
                  ))}
                </div>
              )}

              <div className="host-card-actions">
                <button className="btn btn-cyan" onClick={() => setConfigHost(h)}>CONFIGURE</button>
              </div>
            </div>
          );
        })}
      </div>
      <HostConfigPanel
        host={configHost}
        open={!!configHost}
        onClose={() => setConfigHost(null)}
        onSave={onRefresh}
        token={token}
        roles={roles}
      />
    </>
  );
}

// 3. AGENTS VIEW
// ═══════════════════════════════════════════════════════════════════════════════

function AgentsView({ sessions, summary, now, token, onViewActivity }) {
  const [agentActivity, setAgentActivity] = useState({});
  const [permissions, setPermissions] = useState(null);

  // Fetch RBAC permissions
  useEffect(() => {
    if (!token) return;
    const fetchPerms = async () => {
      try {
        const data = await api('GET', '/v1/dashboard/permissions', null, token);
        setPermissions(data || null);
      } catch { setPermissions(null); }
    };
    fetchPerms();
    const iv = setInterval(fetchPerms, 30000);
    return () => clearInterval(iv);
  }, [token]);

  const agents = useMemo(() => {
    const map = {};
    (sessions || []).forEach(s => {
      if (!map[s.agent]) {
        map[s.agent] = { name: s.agent, sessions: [], targets: new Set(), type: s.agent_type || 'agent' };
      }
      map[s.agent].sessions.push(s);
      if (s.target) map[s.agent].targets.add(s.target);
    });
    const list = Object.values(map).map(a => ({
      ...a,
      targets: [...a.targets],
      activeSessions: a.sessions.filter(s => s.status === 'active'),
    }));

    const statusPriority = (a) => {
      if (a.activeSessions.length > 0) return 0;
      if (a.sessions.some(s => s.status === 'expired')) return 2;
      return 3;
    };
    list.sort((a, b) => statusPriority(a) - statusPriority(b));
    return list;
  }, [sessions]);

  // Fetch per-agent activity data
  useEffect(() => {
    if (!token) return;
    const fetchAgentData = async () => {
      const results = {};
      for (const a of agents) {
        try {
          const data = await api('GET', `/v1/dashboard/activity/agent/${encodeURIComponent(a.name)}`, null, token);
          results[a.name] = data || {};
        } catch {
          results[a.name] = {};
        }
      }
      setAgentActivity(results);
    };
    fetchAgentData();
    const iv = setInterval(fetchAgentData, 5000);
    return () => clearInterval(iv);
  }, [token, agents.length]);

  return (
    <div className="agents-grid">
      {agents.length === 0 ? (
        <div className="empty-state">No agents with sessions</div>
      ) : agents.map(a => {
        const hasActive = a.activeSessions.length > 0;
        const agentStatus = hasActive ? 'active' : 'offline';
        const act = agentActivity[a.name] || {};
        const recentActions = act.entries || [];
        const errorRate = (act.stats || {}).total_actions > 0 ? (((act.stats || {}).total_errors || 0) / (act.stats || {}).total_actions * 100).toFixed(1) : '0.0';
        return (
          <div key={a.name} className="agent-card">
            <div className="agent-card-header">
              <StatusDot status={agentStatus} animated={hasActive} />
              <span className="agent-card-name">{a.name}</span>
              <span className={`badge ${hasActive ? 'badge-active' : 'badge-default'}`}>{a.type}</span>
            </div>

            <div className="agent-activity-stats">
              <div className="stat-item">
                <span>Actions:</span>
                <span className="stat-val" style={{ color: 'var(--green)' }}>{(act.stats || {}).total_actions || 0}</span>
              </div>
              <div className="stat-item">
                <span>Last active:</span>
                <span className="stat-val" style={{ color: 'var(--cyan)' }}>{(act.stats || {}).last_active ? relativeTime((act.stats || {}).last_active) : 'never'}</span>
              </div>
              <div className="stat-item">
                <span>Last target:</span>
                <span className="stat-val" style={{ color: 'var(--cyan)' }}>{(act.stats || {}).last_target || '-'}</span>
              </div>
              <div className="stat-item">
                <span>Error rate:</span>
                <span className="stat-val" style={{ color: parseFloat(errorRate) > 10 ? 'var(--red)' : 'var(--text-dim)' }}>{errorRate}%</span>
              </div>
            </div>

            {recentActions.length > 0 && (
              <div className="agent-mini-timeline" title="Last 10 actions">
                {recentActions.slice(0, 10).map((ra, i) => {
                  const dotType = ra.status === 'error' ? 'error' : (ra.action_type || ra.type || 'exec');
                  return <span key={i} className={`timeline-dot dot-${dotType}`}
                    title={`${ra.action_type || ra.type || '?'} ${ra.target || ''} ${relativeTime(ra.timestamp)}`} />;
                })}
                <span style={{ fontSize: '9px', color: 'var(--text-dim)', marginLeft: '6px' }}>recent</span>
              </div>
            )}

            <div className="agent-card-meta">
              <span>{a.activeSessions.length} active / {a.sessions.length} total sessions</span>
            </div>
            {a.targets.length > 0 && (
              <div className="agent-card-targets">
                {a.targets.map(t => <span key={t} className="agent-target-tag">{t}</span>)}
              </div>
            )}
            <div className="agent-card-sessions">
              {a.sessions.map(s => {
                const remaining = parseTTL(s.expires_at, now);
                const maxTTL = computeMaxTTL(s.issued_at, s.expires_at);
                const isActive = s.status === 'active';
                return (
                  <div key={s.serial} className="agent-session-item" style={{ opacity: isActive ? 1 : 0.4 }}>
                    <div style={{ display: 'flex', alignItems: 'center', gap: '8px' }}>
                      <span style={{ color: 'var(--cyan)' }}>{s.target}</span>
                      <RoleBadge role={s.role} />
                      <StatusBadge status={s.status} />
                    </div>
                    {isActive ? (
                      <div style={{ display: 'flex', alignItems: 'center', gap: '8px', minWidth: '150px' }}>
                        <TTLBar remaining={remaining} maxTTL={maxTTL} />
                      </div>
                    ) : (
                      <span style={{ color: 'var(--text-dim)', fontSize: '10px' }}>{relativeTime(s.expires_at || s.issued_at)}</span>
                    )}
                  </div>
                );
              })}
            </div>
            {/* RBAC Permissions Section */}
            {permissions && permissions.agents && permissions.agents[a.name] && (() => {
              const ap = permissions.agents[a.name];
              return (
                <RbacCollapsible label={`Permissions${ap.legacy_mode ? ' (Legacy)' : ''}`}>
                  {ap.legacy_mode ? (
                    <div style={{ padding: '4px 0' }}>
                      <span className="badge badge-legacy">LEGACY (UNRESTRICTED)</span>
                    </div>
                  ) : (
                    <>
                      {ap.dashboard && (
                        <div className="rbac-group">
                          <div className="rbac-group-label">Dashboard</div>
                          <div style={{ padding: '2px 0' }}>
                            <DashboardLevelBadge level={ap.dashboard} />
                          </div>
                        </div>
                      )}
                      {ap.ssh && Object.keys(ap.ssh).length > 0 && (
                        <div className="rbac-group">
                          <div className="rbac-group-label">SSH Targets</div>
                          {Object.entries(ap.ssh).map(([target, cfg]) => (
                            <div key={target} className="rbac-target-row">
                              <span className="rbac-target-name">{target}</span>
                              <span className="rbac-pill-list">
                                {(cfg.roles || []).map(r => <RoleBadge key={r} role={r} />)}
                              </span>
                              {cfg.auto_approve && <span style={{ fontSize: '9px', color: 'var(--green)' }}>AUTO</span>}
                            </div>
                          ))}
                        </div>
                      )}
                      {ap.services && Object.keys(ap.services).length > 0 && (
                        <div className="rbac-group">
                          <div className="rbac-group-label">Services</div>
                          {Object.entries(ap.services).map(([svc, cfg]) => (
                            <div key={svc} className="rbac-target-row">
                              <span className="rbac-target-name">{svc}</span>
                              <span className="rbac-pill-list">
                                {(cfg.methods || []).map(m => <MethodBadge key={m} method={m} />)}
                              </span>
                            </div>
                          ))}
                        </div>
                      )}
                      {ap.remotes && Object.keys(ap.remotes).length > 0 && (
                        <div className="rbac-group">
                          <div className="rbac-group-label">MCP Servers</div>
                          {Object.entries(ap.remotes).map(([remote, cfg]) => (
                            <div key={remote} className="rbac-target-row">
                              <span style={{ color: 'var(--purple)', fontWeight: 500 }}>{remote}</span>
                              {cfg.tools && cfg.tools.length > 0 ? (
                                <span style={{ fontSize: '10px', color: 'var(--text-dim)' }}>
                                  {cfg.tools.length} tool{cfg.tools.length !== 1 ? 's' : ''} allowed
                                </span>
                              ) : (
                                <span style={{ fontSize: '10px', color: 'var(--text-dim)' }}>all tools</span>
                              )}
                            </div>
                          ))}
                        </div>
                      )}
                    </>
                  )}
                </RbacCollapsible>
              );
            })()}

            <div style={{ borderTop: '1px solid var(--border)', paddingTop: '10px', marginTop: '10px' }}>
              <button className="btn btn-purple" onClick={() => onViewActivity && onViewActivity(a.name)}>
                VIEW ACTIVITY
              </button>
            </div>
          </div>
        );
      })}
    </div>
  );
}

// 4. SESSIONS VIEW
// ═══════════════════════════════════════════════════════════════════════════════

function SessionsView({ sessions, now, onRevoke }) {
  const [statusFilter, setStatusFilter] = useState('ALL');
  const [filterType, setFilterType] = useState('ALL');

  // Filter sessions by status and type
  const filtered = useMemo(() => {
    const list = (sessions || []).filter(s => {
      if (statusFilter === 'ACTIVE' && s.status !== 'active') return false;
      if (statusFilter === 'EXPIRED' && s.status === 'active') return false;
      if (filterType !== 'ALL') {
        const sType = s.type || 'ssh_cert';
        if (filterType === 'SSH' && sType !== 'ssh_cert') return false;
        if (filterType === 'SERVICE' && sType !== 'service') return false;
        if (filterType === 'MCP' && sType !== 'mcp') return false;
      }
      return true;
    });
    // Sort: active sessions by expires_at ascending (expiring soonest first), then expired at bottom
    list.sort((a, b) => {
      const aActive = a.status === 'active' ? 0 : 1;
      const bActive = b.status === 'active' ? 0 : 1;
      if (aActive !== bActive) return aActive - bActive;
      if (aActive === 0) {
        // Both active: sort by expires_at ascending (expiring first)
        return new Date(a.expires_at || 0).getTime() - new Date(b.expires_at || 0).getTime();
      }
      // Both expired: sort by expires_at descending (most recently expired first)
      return new Date(b.expires_at || 0).getTime() - new Date(a.expires_at || 0).getTime();
    });
    return list;
  }, [sessions, statusFilter, filterType, now]);

  const activeCount = (sessions || []).filter(s => s.status === 'active').length;
  const expiredCount = (sessions || []).length - activeCount;
  const sshCount = (sessions || []).filter(s => !s.type || s.type === 'ssh_cert').length;
  const serviceCount = (sessions || []).filter(s => s.type === 'service').length;
  const mcpCount = (sessions || []).filter(s => s.type === 'mcp').length;

  return (
    <div className="panel" style={{ background: 'transparent', border: 'none' }}>
      <div style={{ display: 'flex', gap: '8px', marginBottom: '16px', flexWrap: 'wrap', alignItems: 'center' }}>
        {[
          { key: 'ALL', label: `ALL (${(sessions || []).length})` },
          { key: 'ACTIVE', label: `ACTIVE (${activeCount})` },
          { key: 'EXPIRED', label: `EXPIRED (${expiredCount})` },
        ].map(f => (
          <button key={f.key} className={`filter-btn ${statusFilter === f.key ? 'active' : ''}`}
            onClick={() => setStatusFilter(f.key)}>
            {f.label}
          </button>
        ))}
        <span style={{ width: '1px', height: '20px', background: 'var(--border)', margin: '0 4px' }} />
        {[
          { key: 'ALL', label: 'ALL TYPES' },
          { key: 'SSH', label: `SSH (${sshCount})` },
          { key: 'SERVICE', label: `SERVICE (${serviceCount})` },
          { key: 'MCP', label: `MCP (${mcpCount})` },
        ].map(f => (
          <button key={`type-${f.key}`} className={`filter-btn ${filterType === f.key ? 'active' : ''}`}
            style={filterType === f.key ? { borderColor: f.key === 'SSH' ? 'var(--green)' : f.key === 'SERVICE' ? 'var(--cyan)' : f.key === 'MCP' ? 'var(--purple)' : 'var(--green)', color: f.key === 'SSH' ? 'var(--green)' : f.key === 'SERVICE' ? 'var(--cyan)' : f.key === 'MCP' ? 'var(--purple)' : 'var(--green)', background: f.key === 'SSH' ? 'var(--green-dim)' : f.key === 'SERVICE' ? 'var(--cyan-dim)' : f.key === 'MCP' ? 'var(--purple-dim)' : 'var(--green-dim)' } : {}}
            onClick={() => setFilterType(f.key)}>
            {f.label}
          </button>
        ))}
        <span style={{ fontSize: '10px', color: 'var(--text-dim)', marginLeft: 'auto' }}>
          Sorted: expiring soonest first
        </span>
      </div>
      <div style={{ overflowX: 'auto' }}>
        <table className="sessions-table">
          <thead>
            <tr>
              <th></th>
              <th>Type</th>
              <th>Agent</th>
              <th>Target</th>
              <th>Role</th>
              <th>Status</th>
              <th>Command</th>
              <th>TTL</th>
              <th></th>
            </tr>
          </thead>
          <tbody>
            {filtered.length === 0 ? (
              <tr><td colSpan="9" className="empty-state">No sessions</td></tr>
            ) : filtered.map(s => {
              const isActive = s.status === 'active';
              const remaining = parseTTL(s.expires_at, now);
              const maxTTL = computeMaxTTL(s.issued_at, s.expires_at);
              return (
                <tr key={s.serial} className={!isActive ? 'inactive' : ''}>
                  <td><StatusDot status={isActive ? 'active' : 'offline'} /></td>
                  <td><GrantTypeBadge type={s.type || 'ssh_cert'} /></td>
                  <td style={{ color: 'var(--green)', fontWeight: 600 }}>{s.agent}</td>
                  <td style={{ color: 'var(--cyan)', fontWeight: 600 }}>{s.target}</td>
                  <td><RoleBadge role={s.role} /></td>
                  <td><StatusBadge status={s.status} /></td>
                  <td style={{ color: 'var(--text-dim)', fontSize: '11px', maxWidth: '150px', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>
                    {s.command || '-'}
                  </td>
                  <td style={{ minWidth: '180px' }}>
                    {isActive ? (
                      <TTLBar remaining={remaining} maxTTL={maxTTL} />
                    ) : (
                      <span style={{ fontSize: '10px', color: 'var(--text-dim)' }}>{relativeTime(s.expires_at)}</span>
                    )}
                  </td>
                  <td>
                    {isActive && (
                      <button className="btn btn-revoke" onClick={() => onRevoke(s.serial, s.type || 'ssh_cert')}>REVOKE</button>
                    )}
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
    </div>
  );
}

// 5. AUDIT LOG VIEW

function AuditView({ token, events }) {
  const [filter, setFilter] = useState('ALL');
  const [audit, setAudit] = useState([]);
  const [loading, setLoading] = useState(true);

  const fetchAudit = useCallback(async () => {
    try {
      const typeParam = filter !== 'ALL' ? `&type=${filter.toLowerCase()}` : '';
      const data = await api('GET', `/v1/dashboard/audit?limit=200${typeParam}`, null, token);
      setAudit(data || []);
    } catch {}
    setLoading(false);
  }, [token, filter]);

  useEffect(() => { setLoading(true); fetchAudit(); }, [fetchAudit]);

  // Auto-refresh from WS events
  useEffect(() => { fetchAudit(); }, [events.length]);

  const filters = ['ALL', 'cert', 'mcp', 'http', 'toggle', 'session', 'policy'];

  return (
    <div>
      <div className="audit-filters">
        {filters.map(f => (
          <button key={f} className={`filter-btn ${filter === f ? 'active' : ''}`} onClick={() => setFilter(f)}>
            {f}
          </button>
        ))}
      </div>
      {loading ? (
        <div className="loading">Loading audit log...</div>
      ) : (
        <table className="audit-table">
          <thead>
            <tr>
              <th>Time</th>
              <th>Type</th>
              <th>Agent</th>
              <th>Target</th>
              <th>Role</th>
              <th>Duration</th>
              <th>Detail</th>
            </tr>
          </thead>
          <tbody>
            {audit.length === 0 ? (
              <tr><td colSpan="7" className="empty-state">No audit entries</td></tr>
            ) : audit.map((e, i) => (
              <tr key={i}>
                <td style={{ color: 'var(--text-dim)', whiteSpace: 'nowrap' }}>{relativeTime(e.timestamp)}</td>
                <td><EventTypeBadge type={e.event_type} /></td>
                <td style={{ color: 'var(--green)' }}>{e.agent || '-'}</td>
                <td style={{ color: 'var(--cyan)' }}>{e.target || '-'}</td>
                <td><RoleBadge role={e.role} /></td>
                <td style={{ color: 'var(--text-dim)' }}>{formatDuration(e.duration_ms)}</td>
                <td style={{ color: 'var(--text-dim)', fontSize: '11px', maxWidth: '300px', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>
                  {e.reason || e.serial || '-'}
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      )}
    </div>
  );
}

function ActivityView({ token, initialAgent }) {
  const [entries, setEntries] = useState([]);
  const [actSummary, setActSummary] = useState({});
  const [loading, setLoading] = useState(true);
  const [expanded, setExpanded] = useState(null);
  const [filterAgent, setFilterAgent] = useState(initialAgent || '');
  const [filterType, setFilterType] = useState('');
  const [filterTarget, setFilterTarget] = useState('');
  const [errorsOnly, setErrorsOnly] = useState(false);
  const [agents, setAgents] = useState([]);
  const refreshRef = useRef(null);

  const fetchActivity = useCallback(async () => {
    try {
      let qp = '?limit=100';
      if (filterAgent) qp += `&agent=${encodeURIComponent(filterAgent)}`;
      if (filterType) qp += `&type=${encodeURIComponent(filterType)}`;
      if (filterTarget) qp += `&target=${encodeURIComponent(filterTarget)}`;
      if (errorsOnly) qp += '&only_errors=true';
      const data = await api('GET', `/v1/dashboard/activity${qp}`, null, token);
      setEntries(data || []);
      // Extract unique agents from entries
      const seen = new Set();
      (data || []).forEach(e => { if (e.agent) seen.add(e.agent); });
      setAgents(prev => {
        const merged = new Set([...prev, ...seen]);
        return [...merged].sort();
      });
    } catch {}
  }, [token, filterAgent, filterType, filterTarget, errorsOnly]);

  const fetchSummary = useCallback(async () => {
    try {
      const data = await api('GET', '/v1/dashboard/activity/summary', null, token);
      setActSummary(data || {});
    } catch {}
  }, [token]);

  useEffect(() => {
    setLoading(true);
    Promise.all([fetchActivity(), fetchSummary()]).then(() => setLoading(false));
  }, [fetchActivity, fetchSummary]);

  // Auto-refresh every 2s
  useEffect(() => {
    refreshRef.current = setInterval(() => {
      fetchActivity();
      fetchSummary();
    }, 2000);
    return () => clearInterval(refreshRef.current);
  }, [fetchActivity, fetchSummary]);

  // Update filter if initialAgent changes (from agent click)
  useEffect(() => {
    if (initialAgent) setFilterAgent(initialAgent);
  }, [initialAgent]);

  const actionTypes = ['exec', 'http_proxy', 'session_open', 'session_close', 'cert_issued', 'cert_denied', 'mcp_call'];

  return (
    <div>
      <div className="stats-row">
        <div className="stat-card green">
          <div className="stat-label">Total Actions</div>
          <div className="stat-value green">{actSummary.total_actions || 0}</div>
          <div className="stat-sub">all time</div>
        </div>
        <div className="stat-card cyan">
          <div className="stat-label">SSH Exec</div>
          <div className="stat-value cyan">{actSummary.total_exec || 0}</div>
          <div className="stat-sub">commands</div>
        </div>
        <div className="stat-card purple">
          <div className="stat-label">HTTP Proxy</div>
          <div className="stat-value purple">{actSummary.total_proxy || 0}</div>
          <div className="stat-sub">requests</div>
        </div>
        <div className="stat-card blue">
          <div className="stat-label">MCP Calls</div>
          <div className="stat-value blue">{actSummary.total_mcp || 0}</div>
          <div className="stat-sub">federation</div>
        </div>
        <div className="stat-card red">
          <div className="stat-label">Errors</div>
          <div className="stat-value red">{actSummary.total_errors || 0}</div>
          <div className="stat-sub">failures</div>
        </div>
        <div className="stat-card amber">
          <div className="stat-label">Active Agents</div>
          <div className="stat-value amber">{actSummary.active_agents || 0}</div>
          <div className="stat-sub">connected</div>
        </div>
      </div>

      <div className="activity-filters">
        <select value={filterAgent} onChange={e => setFilterAgent(e.target.value)}>
          <option value="">All Agents</option>
          {agents.map(a => <option key={a} value={a}>{a}</option>)}
        </select>
        <select value={filterType} onChange={e => setFilterType(e.target.value)}>
          <option value="">All Types</option>
          {actionTypes.map(t => <option key={t} value={t}>{t}</option>)}
        </select>
        <input type="text" placeholder="Filter target/service..." value={filterTarget}
          onChange={e => setFilterTarget(e.target.value)} style={{ minWidth: '160px' }} />
        <label>
          <input type="checkbox" checked={errorsOnly} onChange={e => setErrorsOnly(e.target.checked)}
            style={{ width: '14px', height: '14px', accentColor: 'var(--red)', cursor: 'pointer', marginRight: '4px' }} />
          Errors only
        </label>
        <span style={{ fontSize: '10px', color: 'var(--text-dim)', marginLeft: 'auto' }}>
          Auto-refresh: 2s &bull; Showing {entries.length} entries
        </span>
      </div>

      {loading ? (
        <div className="loading">Loading activity...</div>
      ) : (
        <div className="activity-feed">
          {entries.length === 0 ? (
            <div className="empty-state">No activity entries found</div>
          ) : entries.map((e, i) => {
            const isError = e.status === 'error' || e.success === false || !!e.error;
            const isExpanded = expanded === i;
            return (
              <React.Fragment key={i}>
                <div className={`activity-entry ${isError ? 'error-entry' : ''}`}
                  onClick={() => setExpanded(isExpanded ? null : i)}>
                  <span className="act-time">{relativeTime(e.timestamp)}</span>
                  <span><ActionTypeBadge type={e.action_type || e.type} /></span>
                  <span className="act-details">
                    <span className="act-agent">{e.agent || '-'}</span>
                    {' '}
                    {typeof e.details === 'object' && e.details !== null ? JSON.stringify(e.details) : (e.details || e.command || e.url || e.message || '-')}
                  </span>
                  <span className="act-target">{e.target || e.service || '-'}</span>
                  <span className="act-duration">{formatDuration(e.duration_ms)}</span>
                  <span className="act-status">
                    <ActivityStatusBadge status={isError ? 'error' : (e.success === false ? 'error' : (e.status || 'success'))} />
                  </span>
                </div>
                {isExpanded && (
                  <div className="activity-expanded">
                    {e.command && <div><span style={{ color: 'var(--cyan)' }}>Command:</span> {e.command}</div>}
                    {e.url && <div><span style={{ color: 'var(--cyan)' }}>URL:</span> {e.url}</div>}
                    {e.headers && <div><span style={{ color: 'var(--cyan)' }}>Headers:</span> {typeof e.headers === 'string' ? e.headers : JSON.stringify(e.headers, null, 2)}</div>}
                    {e.response && <div><span style={{ color: 'var(--cyan)' }}>Response:</span> {typeof e.response === 'string' ? e.response.substring(0, 500) : JSON.stringify(e.response).substring(0, 500)}</div>}
                    {e.error && <div><span style={{ color: 'var(--red)' }}>Error:</span> {e.error}</div>}
                    {e.agent && <div><span style={{ color: 'var(--cyan)' }}>Agent:</span> {e.agent}</div>}
                    {e.target && <div><span style={{ color: 'var(--cyan)' }}>Target:</span> {e.target}</div>}
                    {e.service && <div><span style={{ color: 'var(--cyan)' }}>Service:</span> {e.service}</div>}
                    {e.duration_ms != null && <div><span style={{ color: 'var(--cyan)' }}>Duration:</span> {formatDuration(e.duration_ms)}</div>}
                    {e.timestamp && <div><span style={{ color: 'var(--cyan)' }}>Timestamp:</span> {new Date(e.timestamp).toISOString()}</div>}
                    {e.serial && <div><span style={{ color: 'var(--cyan)' }}>Serial:</span> {e.serial}</div>}
                  </div>
                )}
              </React.Fragment>
            );
          })}
        </div>
      )}
    </div>
  );
}

function ServiceConfigPanel({ service, open, onClose, onSave, onDelete, token }) {
  const [config, setConfig] = useState(null);
  const [saving, setSaving] = useState(false);
  const [error, setError] = useState('');
  const isNew = !service;

  useEffect(() => {
    if (open) {
      if (service) {
        setConfig({ ...service, credential: service.credential_set ? '***' : '' });
      } else {
        setConfig({
          name: '', url_prefix: '', auth_type: 'none', credential: '',
          username: '', token_header: '', token_prefix: '',
          description: '', timeout: 30, max_response_kb: 1024,
          allowed_methods: 'GET,POST',
        });
      }
      setError('');
    }
  }, [open, service]);

  const handleFieldChange = (field, value) => {
    setConfig(prev => ({ ...prev, [field]: value }));
  };

  const handleSave = async () => {
    setSaving(true);
    setError('');
    try {
      const payload = { ...config };
      if (payload.credential === '***') delete payload.credential;
      if (payload.allowed_methods && typeof payload.allowed_methods === 'string') {
        payload.allowed_methods = payload.allowed_methods.split(',').map(m => m.trim()).filter(Boolean);
      }
      payload.timeout = parseInt(payload.timeout) || 30;
      payload.max_response_kb = parseInt(payload.max_response_kb) || 1024;
      const name = isNew ? encodeURIComponent(payload.name) : encodeURIComponent(service.name);
      await api('PUT', `/v1/dashboard/services/${name}`, payload, token);
      if (onSave) onSave();
      onClose();
    } catch (err) {
      setError(err.message);
    }
    setSaving(false);
  };

  const handleDelete = async () => {
    if (!service) return;
    if (!confirm(`Delete service "${service.name}"?`)) return;
    try {
      await api('DELETE', `/v1/dashboard/services/${encodeURIComponent(service.name)}`, null, token);
      if (onDelete) onDelete();
      onClose();
    } catch (err) {
      setError(err.message);
    }
  };

  if (!open || !config) return null;

  return (
    <>
      <div className={`slideout-overlay ${open ? 'open' : ''}`} onClick={onClose} />
      <div className={`slideout-panel ${open ? 'open' : ''}`}>
        <div className="slideout-header">
          <h3>{isNew ? 'Add Service' : `Configure: ${service.name}`}</h3>
          <button className="slideout-close" onClick={onClose}>&times;</button>
        </div>
        <div className="slideout-body">
          {error && <div className="modal-error" style={{ marginBottom: '16px' }}>{error}</div>}

          <div className="form-section-title">Service Details</div>
          <div className="form-group">
            <label className="form-label">Name</label>
            <input className="form-input" value={config.name || ''} readOnly={!isNew}
              style={isNew ? {} : { opacity: 0.5 }}
              onChange={e => handleFieldChange('name', e.target.value)}
              placeholder="e.g. grafana" />
          </div>
          <div className="form-group">
            <label className="form-label">URL Prefix</label>
            <input className="form-input" value={config.url_prefix || ''}
              onChange={e => handleFieldChange('url_prefix', e.target.value)}
              placeholder="e.g. http://grafana.internal:3030" />
          </div>
          <div className="form-group">
            <label className="form-label">Description</label>
            <input className="form-input" value={config.description || ''}
              onChange={e => handleFieldChange('description', e.target.value)}
              placeholder="Monitoring dashboard" />
          </div>

          <div className="form-section-title">Authentication</div>
          <div className="form-group">
            <label className="form-label">Auth Type</label>
            <select className="form-select" value={config.auth_type || 'none'}
              onChange={e => handleFieldChange('auth_type', e.target.value)}>
              <option value="none">None</option>
              <option value="bearer">Bearer Token</option>
              <option value="basic">Basic Auth</option>
              <option value="header">Custom Header</option>
              <option value="query">Query Parameter</option>
            </select>
          </div>
          {config.auth_type !== 'none' && (
            <div className="form-group">
              <label className="form-label">Credential</label>
              <input className="form-input" type="password"
                value={config.credential === '***' ? '' : (config.credential || '')}
                onChange={e => handleFieldChange('credential', e.target.value)}
                placeholder={config.credential === '***' ? 'set - enter new to change' : 'Enter credential'} />
            </div>
          )}
          {config.auth_type === 'basic' && (
            <div className="form-group">
              <label className="form-label">Username</label>
              <input className="form-input" value={config.username || ''}
                onChange={e => handleFieldChange('username', e.target.value)}
                placeholder="admin" />
            </div>
          )}
          {config.auth_type === 'header' && (
            <div className="form-row">
              <div className="form-group">
                <label className="form-label">Token Header</label>
                <input className="form-input" value={config.token_header || ''}
                  onChange={e => handleFieldChange('token_header', e.target.value)}
                  placeholder="X-API-Key" />
              </div>
              <div className="form-group">
                <label className="form-label">Token Prefix</label>
                <input className="form-input" value={config.token_prefix || ''}
                  onChange={e => handleFieldChange('token_prefix', e.target.value)}
                  placeholder="e.g. Token" />
              </div>
            </div>
          )}

          <div className="form-section-title">Limits</div>
          <div className="form-row">
            <div className="form-group">
              <label className="form-label">Timeout (seconds)</label>
              <input className="form-input" type="number" value={config.timeout || 30}
                onChange={e => handleFieldChange('timeout', e.target.value)} />
            </div>
            <div className="form-group">
              <label className="form-label">Max Response KB</label>
              <input className="form-input" type="number" value={config.max_response_kb || 1024}
                onChange={e => handleFieldChange('max_response_kb', e.target.value)} />
            </div>
          </div>
          <div className="form-group">
            <label className="form-label">Allowed Methods (comma-separated)</label>
            <input className="form-input"
              value={Array.isArray(config.allowed_methods) ? config.allowed_methods.join(', ') : (config.allowed_methods || '')}
              onChange={e => handleFieldChange('allowed_methods', e.target.value)}
              placeholder="GET, POST, PUT, DELETE" />
          </div>
        </div>
        <div className="slideout-footer">
          {!isNew && (
            <button className="btn btn-revoke" onClick={handleDelete} style={{ marginRight: 'auto' }}>DELETE</button>
          )}
          <button className="btn btn-amber" onClick={onClose}>CANCEL</button>
          <button className="btn btn-green" onClick={handleSave} disabled={saving}>
            {saving ? 'SAVING...' : 'SAVE'}
          </button>
        </div>
      </div>
    </>
  );
}

function ServicesView({ token }) {
  const [services, setServices] = useState([]);
  const [loading, setLoading] = useState(true);
  const [configService, setConfigService] = useState(null);
  const [showAdd, setShowAdd] = useState(false);
  const [permissions, setPermissions] = useState(null);

  const fetchServices = useCallback(async () => {
    try {
      const data = await api('GET', '/v1/dashboard/services', null, token);
      setServices((data || []).sort((a, b) => (a.name || '').localeCompare(b.name || '')));
    } catch {}
    setLoading(false);
  }, [token]);

  useEffect(() => { fetchServices(); }, [fetchServices]);

  useEffect(() => {
    if (!token) return;
    const fetchPerms = async () => {
      try {
        const data = await api('GET', '/v1/dashboard/permissions', null, token);
        setPermissions(data || null);
      } catch { setPermissions(null); }
    };
    fetchPerms();
    const iv = setInterval(fetchPerms, 30000);
    return () => clearInterval(iv);
  }, [token]);

  // Build service-to-agents map from permissions
  const serviceAgentMap = useMemo(() => {
    if (!permissions || !permissions.agents) return {};
    const map = {};
    Object.entries(permissions.agents).forEach(([agentName, ap]) => {
      if (ap.legacy_mode || !ap.services) return;
      Object.entries(ap.services).forEach(([svc, cfg]) => {
        if (!map[svc]) map[svc] = [];
        map[svc].push({ agent: agentName, methods: cfg.methods || [] });
      });
    });
    return map;
  }, [permissions]);

  const handleRefresh = () => { fetchServices(); };

  const handleToggleServiceDirect = async (name) => {
    try {
      const result = await api('POST', `/v1/dashboard/services/${encodeURIComponent(name)}/toggle`, null, token);
      setServices(prev => prev.map(s => s.name === name ? { ...s, enabled: result.enabled } : s));
    } catch {}
  };

  return (
    <>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '16px' }}>
        <span style={{ fontSize: '11px', color: 'var(--text-dim)' }}>{services.length} service{services.length !== 1 ? 's' : ''} configured</span>
        <button className="btn btn-green" onClick={() => setShowAdd(true)}>+ ADD SERVICE</button>
      </div>

      {loading ? (
        <div className="loading">Loading services...</div>
      ) : (
        <div className="services-grid">
          {services.length === 0 ? (
            <div className="empty-state" style={{ gridColumn: '1 / -1' }}>No services configured</div>
          ) : services.map(s => (
            <div key={s.name} className={`service-card${s.enabled === false ? ' item-disabled' : ''}`}>
              <div className="service-card-header">
                <span className="service-card-name">{s.name}</span>
                <AuthTypeBadge authType={s.auth_type || 'none'} />
              </div>
              <div className="service-card-url">{s.url_prefix || '-'}</div>
              {s.description && <div className="service-card-desc">{s.description}</div>}
              <div style={{ display: 'flex', gap: '8px', flexWrap: 'wrap', fontSize: '10px', color: 'var(--text-dim)', marginBottom: '10px' }}>
                {s.timeout && <span>Timeout: {s.timeout}s</span>}
                {s.max_response_kb && <span>Max: {s.max_response_kb}KB</span>}
                {s.allowed_methods && <span>Methods: {Array.isArray(s.allowed_methods) ? s.allowed_methods.join(', ') : s.allowed_methods}</span>}
              </div>
              {/* Agent Access from RBAC */}
              {serviceAgentMap[s.name] && serviceAgentMap[s.name].length > 0 && (
                <div style={{ borderTop: '1px solid var(--border)', paddingTop: '8px', marginBottom: '10px' }}>
                  <div style={{ fontSize: '9px', color: 'var(--text-dim)', textTransform: 'uppercase', letterSpacing: '0.8px', marginBottom: '4px' }}>
                    Agent Access
                  </div>
                  {serviceAgentMap[s.name].map(entry => (
                    <div key={entry.agent} className="rbac-target-row">
                      <span className="rbac-agent-name" style={{ minWidth: '60px' }}>{entry.agent}</span>
                      <span className="rbac-pill-list">
                        {entry.methods.map(m => <MethodBadge key={m} method={m} />)}
                      </span>
                    </div>
                  ))}
                </div>
              )}

              <div className="service-card-actions">
                <button className="btn btn-cyan" onClick={() => setConfigService(s)}>CONFIGURE</button>
                <div style={{ marginLeft: 'auto', display: 'flex', alignItems: 'center', gap: '6px' }}>
                  <span style={{ fontSize: '10px', color: 'var(--text-dim)' }}>{s.enabled !== false ? 'ON' : 'OFF'}</span>
                  <ToggleSwitch checked={s.enabled !== false} onChange={() => handleToggleServiceDirect(s.name)} />
                </div>
              </div>
            </div>
          ))}
        </div>
      )}

      <ServiceConfigPanel
        service={showAdd ? null : configService}
        open={showAdd || !!configService}
        onClose={() => { setConfigService(null); setShowAdd(false); }}
        onSave={handleRefresh}
        onDelete={handleRefresh}
        token={token}
      />
    </>
  );
}
